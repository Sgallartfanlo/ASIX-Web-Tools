<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.input-field{background:#18181b;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:0.9rem;padding:0.625rem 0.75rem;border-radius:0.5rem;width:100%;transition:all .2s}
.input-field:focus{outline:none;border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.input-field:hover{border-color:#3f3f46}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#a1a1aa;margin-bottom:0.375rem}
.conv-row{display:flex;align-items:center;padding:0.75rem 0;border-bottom:1px solid #27272a}
.conv-row:last-child{border-bottom:none}
.conv-label{color:#a1a1aa;font-size:0.8rem;width:9rem;flex-shrink:0}
.conv-value{font-family:'Fira Code',monospace;color:#e4e4e7;font-size:0.9rem;word-break:break-all}
.bit-grid{display:flex;gap:2px}
.bit{background:#0f0f11;border-radius:2px;padding:0.125rem 0.1875rem;font-size:0.6rem;font-family:'Fira Code',monospace;text-align:center;min-width:1.2rem;cursor:default;transition:all .15s}
.bit.net{color:#2dd4bf}
.bit.host{color:#52525b}
.bit:hover{background:#27272a;transform:scale(1.15)}
.toggle-track{width:2.75rem;height:1.375rem;background:#27272a;border-radius:999px;position:relative;cursor:pointer;transition:all .3s}
.toggle-track.on{background:rgba(45,212,191,0.3)}
.toggle-knob{width:1.125rem;height:1.125rem;background:#a1a1aa;border-radius:50%;position:absolute;top:0.125rem;left:0.125rem;transition:all .3s}
.toggle-track.on .toggle-knob{left:1.5rem;background:#2dd4bf}
.badge{background:#0f0f11;padding:0.125rem 0.5rem;border-radius:0.25rem;font-family:'Fira Code',monospace;font-size:0.75rem}
.split-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.split-table th{text-align:left;color:#a1a1aa;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;font-size:0.65rem;padding:0.5rem 0.75rem;border-bottom:1px solid #27272a}
.split-table td{padding:0.5rem 0.75rem;border-bottom:1px solid #27272a;font-family:'Fira Code',monospace;color:#e4e4e7}
.split-table tr:hover td{background:rgba(45,212,191,0.03)}
.split-table tr:last-child td{border-bottom:none}
.ipv6-group{display:inline-flex;gap:0;font-family:'Fira Code',monospace;font-size:0.85rem}
.ipv6-group .seg{border-radius:0;padding:0.125rem 0.25rem;transition:all .15s}
.ipv6-group .seg:first-child{border-radius:0.25rem 0 0 0.25rem}
.ipv6-group .seg:last-child{border-radius:0 0.25rem 0.25rem 0}
.ipv6-group .seg.prefix{color:#2dd4bf;background:rgba(45,212,191,0.08)}
.ipv6-group .seg.subnet{color:#a855f7;background:rgba(168,85,247,0.08)}
.ipv6-group .seg.iface{color:#f59e0b;background:rgba(245,158,11,0.08)}
</style>
</head>
<body>
<div class="max-w-3xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-solid fa-network-wired text-[#2dd4bf] text-2xl"></i>
      Subnet Calculator
    </h1>
    <p class="text-[#a1a1aa] text-sm">Advanced IPv4/IPv6 subnetting tool with binary visualization</p>
  </header>

  <div class="flex items-center justify-center gap-3 mb-6">
    <span class="text-xs font-medium text-[#a1a1aa] uppercase tracking-wider">IPv4</span>
    <div class="toggle-track" id="ipv6Toggle" onclick="toggleIPv6()">
      <div class="toggle-knob"></div>
    </div>
    <span class="text-xs font-medium text-[#a1a1aa] uppercase tracking-wider">IPv6</span>
  </div>

  <div id="ipv4Section">
    <div class="card mb-6">
      <div class="card-title"><i class="fa-regular fa-keyboard mr-2"></i>Input</div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label>IP Address</label>
          <input id="ipInput" class="input-field" type="text" placeholder="e.g. 192.168.1.0" value="192.168.1.0">
        </div>
        <div>
          <label>CIDR Prefix / Subnet Mask</label>
          <input id="cidrInput" class="input-field" type="text" placeholder="e.g. 24 or 255.255.255.0" value="24">
        </div>
      </div>
      <div id="detectedMask" class="mt-2 text-xs text-[#52525b] fira"></div>
    </div>

    <div class="grid grid-cols-1 gap-4">
      <div class="card" id="infoCard">
        <div class="card-title"><i class="fa-regular fa-circle-info mr-2"></i>Network Information</div>
        <div id="infoResult"></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-regular fa-diagram-binary mr-2"></i>Binary Representation</div>
        <div id="binaryResult"></div>
      </div>

      <div class="card" id="breakdownCard" style="display:none">
        <div class="card-title"><i class="fa-regular fa-table-cells mr-2"></i>Subnet Breakdown</div>
        <div class="flex items-center gap-3 mb-3">
          <label class="!mb-0">Split into</label>
          <select id="splitSelect" class="input-field !w-auto !py-1 !px-3" onchange="renderSubnetBreakdown()"></select>
        </div>
        <div id="breakdownTable"></div>
      </div>
    </div>
  </div>

  <div id="ipv6Section" style="display:none">
    <div class="card mb-6">
      <div class="card-title"><i class="fa-regular fa-keyboard mr-2"></i>IPv6 Input</div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label>IPv6 Address</label>
          <input id="ipv6Input" class="input-field" type="text" placeholder="e.g. 2001:db8::1">
        </div>
        <div>
          <label>Prefix Length</label>
          <input id="ipv6Prefix" class="input-field" type="number" min="0" max="128" placeholder="e.g. 64" value="64">
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-4">
      <div class="card">
        <div class="card-title"><i class="fa-regular fa-circle-info mr-2"></i>IPv6 Information</div>
        <div id="ipv6Result"></div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> Subnet Calculator</a>
  </footer>
</div>

<script>
var ipInput = document.getElementById('ipInput');
var cidrInput = document.getElementById('cidrInput');
var detectedMask = document.getElementById('detectedMask');
var infoResult = document.getElementById('infoResult');
var binaryResult = document.getElementById('binaryResult');
var breakdownCard = document.getElementById('breakdownCard');
var splitSelect = document.getElementById('splitSelect');
var breakdownTable = document.getElementById('breakdownTable');
var ipv6Section = document.getElementById('ipv6Section');
var ipv4Section = document.getElementById('ipv4Section');
var ipv6Input = document.getElementById('ipv6Input');
var ipv6Prefix = document.getElementById('ipv6Prefix');
var ipv6Result = document.getElementById('ipv6Result');
var ipv6Toggle = document.getElementById('ipv6Toggle');
var isIPv6 = false;

function toggleIPv6() {
  isIPv6 = !isIPv6;
  ipv6Toggle.classList.toggle('on');
  ipv6Section.style.display = isIPv6 ? '' : 'none';
  ipv4Section.style.display = isIPv6 ? 'none' : '';
  if (isIPv6) { calculateIPv6(); } else { calculate(); }
}

function parseIP(str) {
  var parts = str.trim().split('.');
  if (parts.length !== 4) return null;
  var nums = parts.map(function(p) { var n = parseInt(p, 10); return isNaN(n) ? -1 : n; });
  if (nums.some(function(n) { return n < 0 || n > 255; })) return null;
  return nums;
}

function maskToCIDR(mask) {
  var count = 0, seenZero = false;
  for (var i = 0; i < 4; i++) {
    for (var b = 7; b >= 0; b--) {
      if (mask[i] & (1 << b)) { if (seenZero) return -1; count++; }
      else { seenZero = true; }
    }
  }
  return count;
}

function cidrToMask(cidr) {
  var mask = [0, 0, 0, 0];
  for (var i = 0; i < 4; i++) {
    var bits = Math.max(0, Math.min(8, cidr - i * 8));
    if (bits === 0) mask[i] = 0;
    else if (bits === 8) mask[i] = 255;
    else mask[i] = ~((1 << (8 - bits)) - 1) & 0xFF;
  }
  return mask;
}

function parseMask(str) {
  if (/^\d{1,2}$/.test(str.trim())) return parseInt(str.trim(), 10);
  var parts = str.trim().split('.');
  if (parts.length !== 4) return -1;
  var nums = parts.map(function(p) { var n = parseInt(p, 10); return isNaN(n) ? -1 : n; });
  if (nums.some(function(n) { return n < 0 || n > 255; })) return -1;
  var cidr = maskToCIDR(nums);
  return cidr >= 0 ? cidr : -1;
}

function andBytes(a, b) { return [a[0] & b[0], a[1] & b[1], a[2] & b[2], a[3] & b[3]]; }
function orBytes(a, b) { return [a[0] | b[0], a[1] | b[1], a[2] | b[2], a[3] | b[3]]; }
function notBytes(a) { return [(~a[0]) & 0xFF, (~a[1]) & 0xFF, (~a[2]) & 0xFF, (~a[3]) & 0xFF]; }

function ipToNum(octets) {
  return ((octets[0] * 256 + octets[1]) * 256 + octets[2]) * 256 + octets[3];
}

function numToIp(n) {
  return [(n >>> 24) & 0xFF, (n >>> 16) & 0xFF, (n >>> 8) & 0xFF, n & 0xFF];
}

function addOne(a) {
  var r = a.slice();
  for (var i = 3; i >= 0; i--) { r[i]++; if (r[i] <= 255) break; r[i] = 0; }
  return r;
}

function subOne(a) {
  var r = a.slice();
  for (var i = 3; i >= 0; i--) { r[i]--; if (r[i] >= 0) break; r[i] = 255; }
  return r;
}

function isPrivate(ip) {
  if (ip[0] === 10) return true;
  if (ip[0] === 172 && ip[1] >= 16 && ip[1] <= 31) return true;
  if (ip[0] === 192 && ip[1] === 168) return true;
  return false;
}

function isLoopback(ip) { return ip[0] === 127; }
function isLinkLocal(ip) { return ip[0] === 169 && ip[1] === 254; }

function getIPClass(ip) {
  var f = ip[0];
  if (f <= 126) return 'A';
  if (f <= 191) return 'B';
  if (f <= 223) return 'C';
  if (f <= 239) return 'D';
  return 'E';
}

function getClassfulPrefix(cls) {
  if (cls === 'A') return 8;
  if (cls === 'B') return 16;
  if (cls === 'C') return 24;
  return 4;
}

function natClassful(ip) {
  var cls = getIPClass(ip);
  var p = getClassfulPrefix(cls);
  var mask = cidrToMask(p);
  var net = andBytes(ip, mask);
  return ipToString(net) + '/' + p;
}

function renderBits(val, netBits) {
  var h = '';
  for (var b = 7; b >= 0; b--) {
    var bitVal = (val >>> b) & 1;
    var bitPos = 7 - b;
    var cls = bitPos < netBits ? 'net' : 'host';
    var weight = Math.pow(2, b);
    h += '<span class="bit ' + cls + '" title="Bit ' + bitPos + ' (' + weight + ')">' + bitVal + '</span>';
  }
  return h;
}

function ipToString(octets) { return octets.join('.'); }

function calculate() {
  var ipStr = ipInput.value.trim();
  var cidrStr = cidrInput.value.trim();
  var ip = parseIP(ipStr);
  var cidr = parseMask(cidrStr);
  if (!ip || cidr < 0 || cidr > 32) {
    infoResult.innerHTML = '<p class="text-[#52525b] text-sm">Enter a valid IP address and CIDR prefix or subnet mask</p>';
    binaryResult.innerHTML = '';
    detectedMask.textContent = '';
    breakdownCard.style.display = 'none';
    return;
  }
  var mask = cidrToMask(cidr);
  var wildcard = notBytes(mask);
  var network = andBytes(ip, mask);
  var broadcast = orBytes(network, wildcard);
  var totalHosts = Math.pow(2, 32 - cidr);
  var usableHosts = cidr >= 31 ? totalHosts : Math.max(0, totalHosts - 2);
  var firstUsable = cidr >= 31 ? network.slice() : (totalHosts <= 2 ? network.slice() : addOne(network));
  var lastUsable = cidr >= 31 ? broadcast.slice() : (totalHosts <= 2 ? broadcast.slice() : subOne(broadcast));
  var cls = getIPClass(ip);
  var privacy = isPrivate(ip) ? 'Private' : isLoopback(ip) ? 'Loopback' : isLinkLocal(ip) ? 'Link-Local' : 'Public';

  detectedMask.textContent = 'Subnet Mask: ' + ipToString(mask) + '  \u2022  CIDR: /' + cidr + '  \u2022  Wildcard: ' + ipToString(wildcard);

  infoResult.innerHTML =
    '<div class="conv-row"><span class="conv-label">Network</span><span class="conv-value text-[#2dd4bf]">' + ipToString(network) + '/' + cidr + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Broadcast</span><span class="conv-value">' + ipToString(broadcast) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">First Host</span><span class="conv-value">' + ipToString(firstUsable) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Last Host</span><span class="conv-value">' + ipToString(lastUsable) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Total Hosts</span><span class="conv-value">' + totalHosts.toLocaleString() + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Usable Hosts</span><span class="conv-value">' + usableHosts.toLocaleString() + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Wildcard</span><span class="conv-value">' + ipToString(wildcard) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Class</span><span class="conv-value"><span class="badge text-[#2dd4bf]">Class ' + cls + '</span> <span class="badge text-[#a855f7]">' + privacy + '</span>' + (isLoopback(ip) ? '' : ' <span class="badge text-[#52525b]">' + natClassful(ip) + '</span>') + '</span></div>';

  renderBinary(ip, mask, network, broadcast, cidr, firstUsable, lastUsable);
  renderBreakdown(network, cidr);
}

function renderBinary(ip, mask, network, broadcast, cidr, firstUsable, lastUsable) {
  var labels = ['IP Address', 'Subnet Mask', 'Network', 'Broadcast', 'First Host', 'Last Host'];
  var vals = [ip, mask, network, broadcast, firstUsable, lastUsable];
  var h = '<div style="display:grid;grid-template-columns:7rem 1fr 7rem;gap:0.75rem;font-size:0.75rem;color:#a1a1aa;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;padding-bottom:0.25rem;border-bottom:1px solid #27272a"><span>Address</span><span style="text-align:center">Binary</span><span style="text-align:right">Decimal</span></div>';
  for (var r = 0; r < labels.length; r++) {
    var octets = vals[r];
    var bitHtml = '';
    for (var i = 0; i < 4; i++) {
      var bitsInOctet = Math.min(8, Math.max(0, cidr - i * 8));
      bitHtml += '<span class="bit-grid" style="display:inline-flex;gap:1px;margin:0 1px">' + renderBits(octets[i], bitsInOctet) + '</span>';
      if (i < 3) bitHtml += '<span style="color:#27272a;margin:0 2px">.</span>';
    }
    var labelColor = r === 0 ? '#2dd4bf' : r === 1 ? '#52525b' : '#e4e4e7';
    h += '<div class="conv-row" style="padding:0.375rem 0"><span style="color:' + labelColor + ';font-size:0.8rem;width:7rem;flex-shrink:0">' + labels[r] + '</span><div style="flex:1;text-align:center;font-family:\'Fira Code\',monospace;font-size:0.75rem">' + bitHtml + '</div><span style="font-family:\'Fira Code\',monospace;color:#e4e4e7;font-size:0.75rem;width:7rem;text-align:right;word-break:break-all">' + ipToString(octets) + '</span></div>';
  }
  binaryResult.innerHTML = h;
}

function renderBreakdown(network, originalCIDR) {
  if (originalCIDR >= 28) { breakdownCard.style.display = 'none'; return; }
  var options = [];
  var possible = [26, 27, 28];
  for (var i = 0; i < possible.length; i++) {
    if (possible[i] > originalCIDR && possible[i] <= 30) options.push(possible[i]);
  }
  if (options.length === 0) { breakdownCard.style.display = 'none'; return; }
  breakdownCard.style.display = '';
  splitSelect.innerHTML = '';
  for (var i = 0; i < options.length; i++) {
    var opt = document.createElement('option');
    opt.value = options[i];
    opt.textContent = '/' + options[i];
    splitSelect.appendChild(opt);
  }
  renderSubnetBreakdown();
}

function renderSubnetBreakdown() {
  var ip = parseIP(ipInput.value.trim());
  var cidrStr = cidrInput.value.trim();
  var originalCIDR = parseMask(cidrStr);
  if (!ip || originalCIDR < 0) return;
  var splitCIDR = parseInt(splitSelect.value, 10);
  if (!splitCIDR || splitCIDR <= originalCIDR) return;
  var origMask = cidrToMask(originalCIDR);
  var origNet = andBytes(ip, origMask);
  var origNum = ipToNum(origNet);
  var step = Math.pow(2, 32 - splitCIDR);
  var count = Math.pow(2, splitCIDR - originalCIDR);
  var splitMask = cidrToMask(splitCIDR);
  var h = '<table class="split-table"><thead><tr><th>#</th><th>Subnet</th><th>Network</th><th>First Host</th><th>Last Host</th><th>Broadcast</th><th>Hosts</th></tr></thead><tbody>';
  for (var i = 0; i < count; i++) {
    var netNum = origNum + i * step;
    var net = numToIp(netNum);
    var wc = notBytes(splitMask);
    var bc = orBytes(net, wc);
    var total = Math.pow(2, 32 - splitCIDR);
    var first = splitCIDR >= 31 ? net.slice() : (total <= 2 ? net.slice() : addOne(net));
    var last = splitCIDR >= 31 ? bc.slice() : (total <= 2 ? bc.slice() : subOne(bc));
    var cls = i % 2 === 1 ? ' style="background:rgba(255,255,255,0.02)"' : '';
    h += '<tr' + cls + '><td>' + (i + 1) + '</td><td class="text-[#2dd4bf]">' + ipToString(net) + '/' + splitCIDR + '</td><td>' + ipToString(net) + '</td><td>' + ipToString(first) + '</td><td>' + ipToString(last) + '</td><td>' + ipToString(bc) + '</td><td>' + (splitCIDR >= 31 ? total : Math.max(0, total - 2)) + '</td></tr>';
  }
  h += '</tbody></table>';
  breakdownTable.innerHTML = h;
}

function padHex(s, len) {
  while (s.length < len) s = '0' + s;
  return s;
}

function expandIPv6(str) {
  str = str.trim();
  if (str.indexOf('::') !== -1) {
    var parts = str.split('::');
    var left = parts[0] ? parts[0].split(':') : [];
    var right = parts[1] ? parts[1].split(':') : [];
    var missing = 8 - left.length - right.length;
    var middle = [];
    for (var i = 0; i < missing; i++) middle.push('0');
    var all = left.concat(middle).concat(right);
    return all;
  }
  return str.split(':');
}

function parseIPv6(str) {
  var groups = expandIPv6(str);
  if (groups.length !== 8) return null;
  var out = [];
  for (var i = 0; i < 8; i++) {
    var val = parseInt(groups[i], 16);
    if (isNaN(val) || val < 0 || val > 0xFFFF) return null;
    out.push(val);
  }
  return out;
}

function ipv6ToString(groups) {
  var out = [];
  for (var i = 0; i < 8; i++) out.push(groups[i].toString(16));
  var bestStart = -1, bestLen = 0, curStart = -1, curLen = 0;
  for (var i = 0; i < 8; i++) {
    if (groups[i] === 0) {
      if (curStart === -1) curStart = i;
      curLen++;
      if (curLen > bestLen) { bestStart = curStart; bestLen = curLen; }
    } else { curStart = -1; curLen = 0; }
  }
  if (bestLen >= 2) {
    var before = [];
    for (var i = 0; i < bestStart; i++) before.push(groups[i].toString(16));
    var after = [];
    for (var i = bestStart + bestLen; i < 8; i++) after.push(groups[i].toString(16));
    return (before.length ? before.join(':') : '') + '::' + (after.length ? after.join(':') : '');
  }
  return out.join(':');
}

function calculateIPv6() {
  var addrStr = ipv6Input.value.trim();
  var prefixStr = ipv6Prefix.value.trim();
  var addr = parseIPv6(addrStr);
  var prefixLen = parseInt(prefixStr, 10);
  if (!addr || isNaN(prefixLen) || prefixLen < 0 || prefixLen > 128) {
    ipv6Result.innerHTML = '<p class="text-[#52525b] text-sm">Enter a valid IPv6 address and prefix length (0-128)</p>';
    return;
  }
  var groups = addr.slice();
  var prefix = [];
  var iface = [];
  for (var i = 0; i < 8; i++) {
    if ((i + 1) * 16 <= prefixLen) {
      prefix.push(groups[i]);
      iface.push(0);
    } else if (i * 16 >= prefixLen) {
      prefix.push(0);
      iface.push(groups[i]);
    } else {
      var bitsNeeded = prefixLen - i * 16;
      var maskVal = (~((1 << (16 - bitsNeeded)) - 1)) & 0xFFFF;
      prefix.push(groups[i] & maskVal);
      iface.push(groups[i] & (~maskVal & 0xFFFF));
    }
  }
  var subnetBits = Math.max(0, 64 - prefixLen);
  var subnetCount = subnetBits > 0 ? Math.pow(2, subnetBits) : 1;
  var subnetStr = subnetCount >= 1024 ? subnetCount.toExponential(0) : subnetCount.toLocaleString();

  ipv6Result.innerHTML =
    '<div class="conv-row"><span class="conv-label">Full Address</span><span class="conv-value text-[#2dd4bf]">' + ipv6ToString(groups) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Prefix</span><span class="conv-value">' + ipv6ToString(prefix) + '/' + prefixLen + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Interface ID</span><span class="conv-value">' + ipv6ToString(iface) + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">SLAAC /64 Subnets</span><span class="conv-value">' + (prefixLen <= 64 ? subnetStr : 'N/A (prefix > /64)') + '</span></div>' +
    '<div class="conv-row"><span class="conv-label">Total Addresses</span><span class="conv-value">2<sup>' + (128 - prefixLen) + '</sup> = ' + Math.pow(2, Math.min(32, 128 - prefixLen)).toLocaleString() + (128 - prefixLen > 32 ? ' \u00d7 2<sup>' + (128 - prefixLen - 32) + '</sup>' : '') + '</span></div>';

  var h = '<div class="card-title !mb-2 mt-4"><i class="fa-regular fa-diagram-binary mr-2"></i>Binary Visualization</div><div class="fira text-xs leading-relaxed overflow-x-auto">';
  var allBits = '';
  for (var i = 0; i < 8; i++) {
    allBits += padHex(groups[i].toString(2), 16);
  }
  h += '<div class="flex flex-wrap gap-0.5 mt-1" style="word-break:break-all">';
  for (var i = 0; i < 128; i++) {
    var bitCls = i < prefixLen ? 'text-[#2dd4bf]' : 'text-[#52525b]';
    if (i > 0 && i % 16 === 0) h += '<span class="text-[#27272a] mx-0.5">:</span>';
    h += '<span class="' + bitCls + '">' + allBits[i] + '</span>';
  }
  h += '</div></div>';
  ipv6Result.innerHTML += h;
}

ipInput.oninput = function() { if (!isIPv6) calculate(); };
cidrInput.oninput = function() { if (!isIPv6) calculate(); };
ipv6Input.oninput = function() { if (isIPv6) calculateIPv6(); };
ipv6Prefix.oninput = function() { if (isIPv6) calculateIPv6(); };

calculate();
</script>
</body>
</html>
