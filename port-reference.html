.port-row .port-proto.both{color:#a855f7;background:rgba(168,85,247,0.1)}

.port-tag.registered{background:rgba(251,191,36,0.1);color:#fbbf24}
.port-tag.dynamic{background:rgba(239,68,68,0.1);color:#ef4444}

.btn-filter:hover{background:#3f3f46;border-color:#2dd4bf;color:#2dd4bf}
.btn-filter.active{background:rgba(45,212,191,0.1);border-color:#2dd4bf;color:#2dd4bf}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}

<div class="max-w-5xl mx-auto px-4 py-6">

      <i class="fa-solid fa-plug text-[#2dd4bf] text-2xl"></i>
      Port Reference

    <p class="text-[#a1a1aa] text-sm">Consulta de ports de xarxa, protocols i serveis</p>

    <div class="card">

        </div>
        <div class="flex gap-2">

    </div>

      <div class="stat-box"><div class="num text-[#fbbf24]" id="udpCount">0</div><div class="lbl">UDP</div></div>
      <div class="stat-box"><div class="num text-[#a855f7]" id="bothCount">0</div><div class="lbl">TCP+UDP</div></div>
    </div>

    <div class="card">
      <div id="portsList" class="space-y-1.5"></div>
      <div id="noResults" class="hidden text-center py-8 text-[#52525b]">
        <i class="fa-solid fa-search text-3xl mb-2 block opacity-30"></i>
        <p>No s'han trobat ports amb aquesta cerca</p>
      </div>
    </div>
  </div>

    <p class="text-[#52525b] text-xs mt-2">Port Reference &mdash; Basat en IANA Service Name Registry</p>
  </footer>
</div>

let currentFilter = 'all';

function renderPorts() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('portsList');
  const noRes = document.getElementById('noResults');

  let filtered = PORTS;
  if (currentFilter === 'well-known') filtered = filtered.filter(p => p.port < 1024);
  else if (currentFilter === 'registered') filtered = filtered.filter(p => p.port >= 1024 && p.port < 49152);

  if (q) {
    filtered = filtered.filter(p =>
      String(p.port).includes(q) ||
      p.svc.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.proto.includes(q.replace(/^(tcp|udp)$/, ''))
    );
  }

  if (!filtered.length) {
    list.innerHTML = '';
    noRes.classList.remove('hidden');
    updateStats([]);
    return;
  }
  noRes.classList.add('hidden');

  list.innerHTML = filtered.map(p => {
    const isWellKnown = p.port < 1024;
    const isRegistered = p.port >= 1024 && p.port < 49152;
    const tag = isWellKnown ? '<span class="port-tag well-known">Well-Known</span>' : (isRegistered ? '<span class="port-tag registered">Registered</span>' : '');
    const protoCls = p.proto === 'both' ? 'both' : p.proto;
    const protoLabel = p.proto === 'both' ? 'TCP+UDP' : p.proto.toUpperCase();
    return `<div class="port-row">
      <span class="port-num">${p.port}</span>
      <span class="port-proto ${protoCls}">${protoLabel}</span>
      <span class="port-service">${p.svc}</span>
      <span class="port-desc">${p.desc}</span>
      ${tag ? `<span>${tag}</span>` : ''}
    </div>`;
  }).join('');

  updateStats(filtered);
}

function updateStats(filtered) {
  document.getElementById('totalPorts').textContent = filtered.length;
  document.getElementById('tcpCount').textContent = filtered.filter(p => p.proto === 'tcp' || p.proto === 'both').length;
  document.getElementById('udpCount').textContent = filtered.filter(p => p.proto === 'udp' || p.proto === 'both').length;
  document.getElementById('bothCount').textContent = filtered.filter(p => p.proto === 'both').length;
}

function filterCat(cat) {
  currentFilter = cat;
  ['all','well-known','registered'].forEach(c => {
    document.getElementById('cat' + c.charAt(0).toUpperCase() + c.slice(1)).classList.toggle('active', c === cat);
  });
  renderPorts();
}

document.getElementById('searchInput').addEventListener('input', renderPorts);

renderPorts();
