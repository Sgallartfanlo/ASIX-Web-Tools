<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.btn{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f0f11;border:none;padding:0.625rem 1.5rem;border-radius:0.5rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:0.5rem}
.btn:hover{opacity:0.9}
.btn:active{opacity:0.8}
.btn-outline{background:#18181b;border:1px solid #27272a;color:#d4d4d8;font-family:'Inter',sans-serif;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-outline:hover{background:#27272a;border-color:#2dd4bf;color:#2dd4bf}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#a1a1aa;margin-bottom:0.375rem}
.checkbox-group{display:flex;flex-wrap:wrap;gap:0.75rem}
.checkbox-group label{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;text-transform:none;color:#d4d4d8;cursor:pointer;letter-spacing:0;margin-bottom:0}
.checkbox-group input[type=checkbox]{width:1rem;height:1rem;accent-color:#2dd4bf;cursor:pointer}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#27272a;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#2dd4bf;cursor:pointer;border:2px solid #18181b}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#2dd4bf;cursor:pointer;border:2px solid #18181b}
.password-display{background:#0f0f11;border:1px solid #27272a;border-radius:0.5rem;padding:1rem;font-family:'Fira Code',monospace;font-size:1.25rem;text-align:center;word-break:break-all;min-height:3.5rem;display:flex;align-items:center;justify-content:center;color:#e4e4e7}
.strength-bar{height:4px;border-radius:2px;transition:all .3s;margin-top:0.5rem}
.strength-label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
</style>
</head>
<body>
<div class="max-w-lg mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-solid fa-lock text-[#2dd4bf] text-2xl"></i>
      Password Generator
    </h1>
    <p class="text-[#a1a1aa] text-sm">Generate strong, random passwords</p>
  </header>

  <div class="space-y-6">
    <div class="card">
      <div class="password-display" id="passwordDisplay">Click Generate</div>
      <div id="strengthSection" class="mt-3 hidden">
        <div class="flex items-center justify-between mb-1">
          <span class="strength-label" id="strengthLabel">Strength</span>
          <span class="text-xs text-[#a1a1aa] fira" id="entropyDisplay">0 bits</span>
        </div>
        <div class="strength-bar" id="strengthBar" style="width:0%;background:#27272a"></div>
      </div>
    </div>

    <div class="flex gap-3 justify-center">
      <button class="btn" id="generateBtn"><i class="fa-solid fa-arrows-rotate"></i> Generate</button>
      <button class="btn-outline" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-regular fa-sliders mr-2"></i>Options</div>
      <div class="mb-4">
        <label>Length: <span id="lengthDisplay" class="fira text-[#2dd4bf]">16</span></label>
        <input type="range" id="lengthSlider" min="4" max="64" value="16" step="1">
        <div class="flex justify-between text-xs text-[#52525b]"><span>4</span><span>64</span></div>
      </div>
      <div class="checkbox-group mb-4">
        <label><input type="checkbox" id="chkUpper" checked> A-Z (uppercase)</label>
        <label><input type="checkbox" id="chkLower" checked> a-z (lowercase)</label>
        <label><input type="checkbox" id="chkNumbers" checked> 0-9 (numbers)</label>
        <label><input type="checkbox" id="chkSymbols" checked> !@#$ (symbols)</label>
      </div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="chkAmbiguous"> Exclude ambiguous (Il1O0)</label>
      </div>
    </div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> Password Generator</a>
  </footer>
</div>

<script>
const lengthSlider = document.getElementById('lengthSlider');
const lengthDisplay = document.getElementById('lengthDisplay');
const passwordDisplay = document.getElementById('passwordDisplay');
const generateBtn = document.getElementById('generateBtn');
const copyBtn = document.getElementById('copyBtn');
const strengthSection = document.getElementById('strengthSection');
const strengthBar = document.getElementById('strengthBar');
const strengthLabel = document.getElementById('strengthLabel');
const entropyDisplay = document.getElementById('entropyDisplay');

const CHARS_UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const CHARS_LOWER = 'abcdefghijklmnopqrstuvwxyz';
const CHARS_NUMBERS = '0123456789';
const CHARS_SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?/~';
const AMBIGUOUS = 'Il1O0';

function getCharset() {
  let chars = '';
  const checked = {};
  document.querySelectorAll('.checkbox-group input[type=checkbox]').forEach(function(cb){
    checked[cb.id] = cb.checked;
  });
  if (checked.chkUpper) chars += CHARS_UPPER;
  if (checked.chkLower) chars += CHARS_LOWER;
  if (checked.chkNumbers) chars += CHARS_NUMBERS;
  if (checked.chkSymbols) chars += CHARS_SYMBOLS;
  if (checked.chkAmbiguous) {
    chars = chars.split('').filter(function(c){ return AMBIGUOUS.indexOf(c) === -1; }).join('');
  }
  return chars;
}

function getRandomByte() {
  const arr = new Uint8Array(1);
  crypto.getRandomValues(arr);
  return arr[0];
}

function generatePassword() {
  const charset = getCharset();
  const len = parseInt(lengthSlider.value);
  if (!charset) {
    passwordDisplay.textContent = 'Select at least one character set';
    strengthSection.classList.add('hidden');
    return '';
  }
  let password = '';
  for (let i = 0; i < len; i++) {
    password += charset[getRandomByte() % charset.length];
  }
  return password;
}

function calculateStrength(password, charsetSize) {
  const len = password.length;
  const entropy = len * Math.log2(charsetSize);
  let score = entropy / 128;
  if (score > 1) score = 1;
  return { entropy: Math.round(entropy * 10) / 10, score: score };
}

function updateStrength(password, charsetSize) {
  if (!password) { strengthSection.classList.add('hidden'); return; }
  const result = calculateStrength(password, charsetSize);
  strengthSection.classList.remove('hidden');
  entropyDisplay.textContent = result.entropy + ' bits';
  const pct = Math.round(result.score * 100);
  strengthBar.style.width = pct + '%';
  let color, label;
  if (pct < 30) { color = '#ef4444'; label = 'Weak'; }
  else if (pct < 60) { color = '#f59e0b'; label = 'Medium'; }
  else if (pct < 85) { color = '#22c55e'; label = 'Strong'; }
  else { color = '#2dd4bf'; label = 'Very Strong'; }
  strengthBar.style.background = color;
  strengthLabel.textContent = label;
  strengthLabel.style.color = color;
}

function doGenerate() {
  const charset = getCharset();
  if (!charset) {
    passwordDisplay.textContent = 'Select at least one character set';
    strengthSection.classList.add('hidden');
    return;
  }
  const pw = generatePassword();
  passwordDisplay.textContent = pw;
  updateStrength(pw, charset.length);
}

lengthSlider.oninput = function() {
  lengthDisplay.textContent = this.value;
};
generateBtn.onclick = doGenerate;
document.querySelectorAll('.checkbox-group input[type=checkbox]').forEach(function(cb){
  cb.onchange = function() {
    const charset = getCharset();
    if (!charset) {
      passwordDisplay.textContent = 'Select at least one character set';
      strengthSection.classList.add('hidden');
    }
  };
});

copyBtn.onclick = function() {
  const text = passwordDisplay.textContent;
  if (!text || text === 'Click Generate' || text === 'Select at least one character set') return;
  navigator.clipboard.writeText(text).then(function(){
    copyBtn.innerHTML = '<i class="fa-regular fa-check"></i> Copied!';
    setTimeout(function(){ copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy'; }, 2000);
  });
};

doGenerate();
</script>
</body>
</html>
