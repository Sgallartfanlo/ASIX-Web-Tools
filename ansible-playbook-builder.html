<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansible Playbook Builder - Generador visual de playbooks Ansible</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #e2e8f0; overflow: hidden; height: 100vh; }
.font-mono { font-family: 'Fira Code', monospace; }
.sidebar { width: 300px; min-width: 300px; background: #1a1a2e; border-right: 1px solid #2d2d4a; overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: #1a1a2e; }
.sidebar::-webkit-scrollbar-thumb { background: #3d3d6b; border-radius: 3px; }
.module-card { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.module-card:hover { background: #252545; border-color: #4f46e5; transform: translateX(4px); }
.module-card:active { transform: scale(0.98); }
.module-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 16px; }
.panel { overflow-y: auto; }
.panel::-webkit-scrollbar { width: 6px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: #3d3d6b; border-radius: 3px; }
.terminal-panel { background: #0a0a14; border-left: 1px solid #2d2d4a; width: 420px; min-width: 380px; font-family: 'Fira Code', monospace; font-size: 13px; }
.terminal-header { background: #12121e; border-bottom: 1px solid #2d2d4a; padding: 10px 16px; }
.terminal-body { padding: 16px; overflow-y: auto; height: calc(100% - 44px); white-space: pre-wrap; word-break: break-all; }
.terminal-body .yaml-key { color: #7dd3fc; }
.terminal-body .yaml-string { color: #a5f3b4; }
.terminal-body .yaml-bool { color: #fde68a; }
.terminal-body .yaml-int { color: #fca5a5; }
.terminal-body .yaml-comment { color: #64748b; }
.terminal-body .yaml-dash { color: #c4b5fd; }
.task-item { background: #1e1e36; border: 1px solid #2d2d4a; border-radius: 8px; transition: all 0.2s; }
.task-item:hover { border-color: #4f46e5; }
.task-item.selected { border-color: #4f46e5; box-shadow: 0 0 0 1px #4f46e5; }
.task-params { border-top: 1px solid #2d2d4a; }
input, textarea, select { background: #12121e; border: 1px solid #2d2d4a; color: #e2e8f0; border-radius: 6px; padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
input:focus, textarea:focus, select:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.2); }
textarea { resize: vertical; min-height: 80px; font-family: 'Fira Code', monospace; font-size: 12px; }
label { font-size: 12px; font-weight: 500; color: #94a3b8; margin-bottom: 4px; display: block; }
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #4f46e5; color: #fff; }
.btn-primary:hover { background: #6366f1; }
.btn-success { background: #059669; color: #fff; }
.btn-success:hover { background: #10b981; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #ef4444; }
.btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d2d4a; }
.btn-ghost:hover { background: #1e1e36; color: #e2e8f0; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-apt { background: #1e3a5f; color: #60a5fa; }
.tag-copy { background: #1e3a2f; color: #34d399; }
.tag-template { background: #3a2f1e; color: #fbbf24; }
.tag-service { background: #3a1e2f; color: #f472b6; }
.tag-user { background: #2f1e3a; color: #a78bfa; }
.tag-file { background: #1e2f3a; color: #38bdf8; }
.tag-lineinfile { background: #2f3a1e; color: #a3e635; }
.tag-shell { background: #3a1e1e; color: #fb7185; }
.tag-git { background: #1e3a3a; color: #2dd4bf; }
.tag-docker_container { background: #1e2f1e; color: #4ade80; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #475569; text-align: center; padding: 40px; }
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.fade-in { animation: fadeIn 0.2s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="h-screen flex flex-col">
  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-3 bg-[#12121e] border-b border-[#2d2d4a]">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
        <i class="fas fa-play-circle text-white text-sm"></i>
      </div>
      <div>
        <h1 class="text-base font-semibold text-white">Ansible Playbook Builder</h1>
        <p class="text-xs text-slate-500">Generador visual de playbooks Ansible</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 text-xs text-slate-500">
        <span class="pulse-dot bg-green-500"></span>
        <span id="task-count">0 tasks</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="sidebar p-4">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Modules</h2>
        <span class="text-xs text-slate-600">Click per afegir</span>
      </div>
      <div id="modules-list" class="space-y-1.5"></div>
    </aside>

    <!-- Center panel -->
    <main class="flex-1 flex flex-col panel">
      <!-- Playbook config -->
      <div class="p-4 pb-2 border-b border-[#2d2d4a] bg-[#15152a]">
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div>
            <label>Play Name</label>
            <input type="text" id="play-name" value="Deploy application" class="text-sm">
          </div>
          <div>
            <label>Hosts</label>
            <input type="text" id="play-hosts" value="webservers" class="text-sm">
          </div>
          <div>
            <label>Become</label>
            <select id="play-become" class="text-sm">
              <option value="yes">yes</option>
              <option value="no">no</option>
            </select>
          </div>
        </div>
        <div>
          <label>Variables (YAML)</label>
          <textarea id="play-vars" rows="2" class="text-xs font-mono">nginx_port: 80
app_version: "1.2.3"</textarea>
        </div>
      </div>

      <!-- Tasks list -->
      <div class="flex-1 p-4 overflow-y-auto" id="tasks-container">
        <div class="empty-state" id="empty-state">
          <i class="fa-regular fa-rectangle-list"></i>
          <h3 class="text-base font-medium text-slate-500 mb-1">Cap tasca afegida</h3>
          <p class="text-sm text-slate-600">Fes clic en un mòdul del panel esquerre per començar</p>
        </div>
        <div id="tasks-list" class="space-y-2"></div>
      </div>
    </main>

    <!-- Right terminal panel -->
    <aside class="terminal-panel flex flex-col">
      <div class="terminal-header flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="flex gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-yellow-500"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
          </div>
          <span class="text-xs text-slate-500 ml-2">playbook.yml</span>
        </div>
        <div class="flex gap-1.5">
          <button onclick="copyYaml()" class="btn btn-ghost btn-sm" title="Copy YAML"><i class="fa-regular fa-copy"></i></button>
          <button onclick="downloadYaml()" class="btn btn-success btn-sm" title="Download"><i class="fa-solid fa-download"></i></button>
        </div>
      </div>
      <div class="terminal-body" id="yaml-output"><span class="yaml-comment"># Afegeix tasques per veure el YAML generat</span></div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="bg-[#12121e] border-t border-[#2d2d4a] py-2 px-6 text-xs text-slate-600 text-center">
    Desenvolupat per Sergi Gallart · Ansible Playbook Builder
  </footer>
</div>

<script>
const MODULES = [
  { id: 'apt', icon: 'fa-brands fa-ubuntu', color: '#60a5fa', bg: '#1e3a5f', label: 'apt', desc: 'Gestiona paquets apt' },
  { id: 'copy', icon: 'fa-regular fa-copy', color: '#34d399', bg: '#1e3a2f', label: 'copy', desc: 'Copia fitxers al remot' },
  { id: 'template', icon: 'fa-regular fa-file-lines', color: '#fbbf24', bg: '#3a2f1e', label: 'template', desc: 'Desplega plantilles Jinja2' },
  { id: 'service', icon: 'fa-solid fa-server', color: '#f472b6', bg: '#3a1e2f', label: 'service', desc: 'Controla serveis' },
  { id: 'user', icon: 'fa-solid fa-user', color: '#a78bfa', bg: '#2f1e3a', label: 'user', desc: 'Gestiona usuaris' },
  { id: 'file', icon: 'fa-regular fa-folder', color: '#38bdf8', bg: '#1e2f3a', label: 'file', desc: 'Gestiona fitxers i directoris' },
  { id: 'lineinfile', icon: 'fa-solid fa-pen', color: '#a3e635', bg: '#2f3a1e', label: 'lineinfile', desc: 'Assegura línies en fitxers' },
  { id: 'shell', icon: 'fa-solid fa-terminal', color: '#fb7185', bg: '#3a1e1e', label: 'shell', desc: 'Executa comandes shell' },
  { id: 'git', icon: 'fa-brands fa-git-alt', color: '#2dd4bf', bg: '#1e3a3a', label: 'git', desc: 'Clona repositoris Git' },
  { id: 'docker_container', icon: 'fa-brands fa-docker', color: '#4ade80', bg: '#1e2f1e', label: 'docker_container', desc: 'Gestiona contenidors Docker' },
];

const MODULE_PARAMS = {
  apt: [
    { key: 'name', label: 'Package name', type: 'text', placeholder: 'nginx', required: true },
    { key: 'state', label: 'State', type: 'select', options: ['present', 'absent', 'latest'], default: 'present' },
    { key: 'update_cache', label: 'Update cache', type: 'select', options: ['yes', 'no'], default: 'yes' },
  ],
  copy: [
    { key: 'src', label: 'Source path', type: 'text', placeholder: '/local/path/file', required: true },
    { key: 'dest', label: 'Destination path', type: 'text', placeholder: '/remote/path/file', required: true },
    { key: 'owner', label: 'Owner', type: 'text', placeholder: 'root' },
    { key: 'mode', label: 'Mode', type: 'text', placeholder: '0644' },
  ],
  template: [
    { key: 'src', label: 'Source template', type: 'text', placeholder: 'template.j2', required: true },
    { key: 'dest', label: 'Destination', type: 'text', placeholder: '/etc/nginx/nginx.conf', required: true },
    { key: 'owner', label: 'Owner', type: 'text', placeholder: 'root' },
    { key: 'mode', label: 'Mode', type: 'text', placeholder: '0644' },
  ],
  service: [
    { key: 'name', label: 'Service name', type: 'text', placeholder: 'nginx', required: true },
    { key: 'state', label: 'State', type: 'select', options: ['started', 'stopped', 'restarted', 'reloaded'], default: 'started' },
    { key: 'enabled', label: 'Enabled', type: 'select', options: ['yes', 'no'], default: 'yes' },
  ],
  user: [
    { key: 'name', label: 'Username', type: 'text', placeholder: 'deploy', required: true },
    { key: 'state', label: 'State', type: 'select', options: ['present', 'absent'], default: 'present' },
    { key: 'groups', label: 'Groups', type: 'text', placeholder: 'sudo,www-data' },
    { key: 'shell', label: 'Shell', type: 'text', placeholder: '/bin/bash' },
  ],
  file: [
    { key: 'path', label: 'Path', type: 'text', placeholder: '/etc/some/file', required: true },
    { key: 'state', label: 'State', type: 'select', options: ['file', 'directory', 'link', 'absent'], default: 'file' },
    { key: 'owner', label: 'Owner', type: 'text', placeholder: 'root' },
    { key: 'mode', label: 'Mode', type: 'text', placeholder: '0644' },
  ],
  lineinfile: [
    { key: 'path', label: 'File path', type: 'text', placeholder: '/etc/nginx/nginx.conf', required: true },
    { key: 'line', label: 'Line', type: 'text', placeholder: 'server_names_hash_bucket_size 64;', required: true },
    { key: 'regexp', label: 'Regexp', type: 'text', placeholder: '^server_names_hash_bucket_size' },
    { key: 'state', label: 'State', type: 'select', options: ['present', 'absent'], default: 'present' },
  ],
  shell: [
    { key: 'cmd', label: 'Command', type: 'text', placeholder: 'uptime', required: true },
    { key: 'chdir', label: 'Chdir', type: 'text', placeholder: '/opt/app' },
    { key: 'creates', label: 'Creates', type: 'text', placeholder: '/opt/app/.deployed' },
  ],
  git: [
    { key: 'repo', label: 'Repository URL', type: 'text', placeholder: 'https://github.com/user/repo.git', required: true },
    { key: 'dest', label: 'Destination', type: 'text', placeholder: '/opt/app', required: true },
    { key: 'version', label: 'Version', type: 'text', placeholder: 'main' },
    { key: 'force', label: 'Force', type: 'select', options: ['yes', 'no'], default: 'yes' },
  ],
  docker_container: [
    { key: 'name', label: 'Container name', type: 'text', placeholder: 'my-app', required: true },
    { key: 'image', label: 'Image', type: 'text', placeholder: 'nginx:latest', required: true },
    { key: 'state', label: 'State', type: 'select', options: ['started', 'stopped', 'absent', 'running'], default: 'started' },
    { key: 'ports', label: 'Ports', type: 'text', placeholder: '80:80' },
    { key: 'env', label: 'Environment', type: 'text', placeholder: 'KEY=VALUE,FOO=bar' },
  ],
};

let tasks = [];
let editingTaskId = null;

function renderModules() {
  const container = document.getElementById('modules-list');
  container.innerHTML = MODULES.map(m => `
    <div class="module-card flex items-center gap-3 p-2.5 rounded-lg" onclick="addTask('${m.id}')">
      <div class="module-icon" style="background:${m.bg};color:${m.color}">
        <i class="${m.icon}"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-white">${m.label}</div>
        <div class="text-xs text-slate-500 truncate">${m.desc}</div>
      </div>
      <i class="fa-solid fa-plus text-xs text-slate-600 opacity-0 group-hover:opacity-100" style="opacity:0.4"></i>
    </div>
  `).join('');
}

function addTask(moduleId) {
  const params = MODULE_PARAMS[moduleId];
  const task = {
    id: Date.now() + Math.random() * 1000 | 0,
    module: moduleId,
    name: '',
    params: {},
    editing: true,
  };
  params.forEach(p => {
    task.params[p.key] = p.default || '';
  });
  tasks.push(task);
  editingTaskId = task.id;
  renderTasks();
  renderYaml();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  if (editingTaskId === id) editingTaskId = null;
  renderTasks();
  renderYaml();
}

function toggleEdit(id) {
  if (editingTaskId === id) {
    editingTaskId = null;
  } else {
    editingTaskId = id;
  }
  renderTasks();
}

function updateTaskParam(taskId, key, value) {
  const task = tasks.find(t => t.id === taskId);
  if (task) {
    task.params[key] = value;
    renderYaml();
  }
}

function updateTaskName(taskId, value) {
  const task = tasks.find(t => t.id === taskId);
  if (task) {
    task.name = value;
    renderYaml();
  }
}

function renderTasks() {
  const container = document.getElementById('tasks-list');
  const empty = document.getElementById('empty-state');
  const taskCount = document.getElementById('task-count');

  taskCount.textContent = tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');

  if (tasks.length === 0) {
    empty.style.display = 'flex';
    container.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = tasks.map(t => {
    const params = MODULE_PARAMS[t.module];
    const moduleInfo = MODULES.find(m => m.id === t.module);
    const isEditing = editingTaskId === t.id;
    return `
      <div class="task-item fade-in ${isEditing ? 'selected' : ''}" data-task-id="${t.id}">
        <div class="flex items-center gap-3 p-3 cursor-pointer" onclick="toggleEdit(${t.id})">
          <div class="module-icon" style="background:${moduleInfo.bg};color:${moduleInfo.color};width:30px;height:30px;font-size:13px;flex-shrink:0">
            <i class="${moduleInfo.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="tag tag-${t.module}">${t.module}</span>
              <span class="text-sm text-white truncate">${t.name || `${moduleInfo.label} task`}</span>
            </div>
          </div>
          <div class="flex items-center gap-1">
            <button onclick="event.stopPropagation();toggleEdit(${t.id})" class="btn btn-ghost btn-sm" title="Edit">
              <i class="fa-regular fa-pen-to-square"></i>
            </button>
            <button onclick="event.stopPropagation();deleteTask(${t.id})" class="btn btn-danger btn-sm" title="Delete">
              <i class="fa-regular fa-trash-can"></i>
            </button>
          </div>
        </div>
        ${isEditing ? `
          <div class="task-params p-3">
            <div class="mb-2">
              <label>Task Name (opcional)</label>
              <input type="text" value="${t.name}" placeholder="${moduleInfo.label} task" oninput="updateTaskName(${t.id}, this.value)">
            </div>
            ${params.map(p => `
              <div class="mb-2">
                <label>${p.label} ${p.required ? '<span class="text-red-400">*</span>' : ''}</label>
                ${p.type === 'select'
                  ? `<select onchange="updateTaskParam(${t.id}, '${p.key}', this.value)">
                      ${p.options.map(o => `<option value="${o}" ${(t.params[p.key]||'') === o ? 'selected' : ''}>${o}</option>`).join('')}
                     </select>`
                  : `<input type="text" value="${t.params[p.key] || ''}" placeholder="${p.placeholder || ''}" oninput="updateTaskParam(${t.id}, '${p.key}', this.value)">`
                }
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function renderYaml() {
  const output = document.getElementById('yaml-output');
  const playName = document.getElementById('play-name').value || 'play';
  const hosts = document.getElementById('play-hosts').value || 'all';
  const become = document.getElementById('play-become').value;
  const varsText = document.getElementById('play-vars').value.trim();

  if (tasks.length === 0) {
    output.innerHTML = '<span class="yaml-comment"># Afegeix tasques per veure el YAML generat</span>';
    return;
  }

  let yaml = '';
  yaml += `<span class="yaml-dash">---</span>\n`;
  yaml += `<span class="yaml-dash">-</span> <span class="yaml-key">name</span>: <span class="yaml-string">${escapeYaml(playName)}</span>\n`;
  yaml += `  <span class="yaml-key">hosts</span>: <span class="yaml-string">${escapeYaml(hosts)}</span>\n`;
  yaml += `  <span class="yaml-key">become</span>: <span class="yaml-bool">${become}</span>\n`;

  if (varsText) {
    yaml += `  <span class="yaml-key">vars</span>:\n`;
    const lines = varsText.split('\n');
    lines.forEach(line => {
      if (line.trim()) {
        yaml += `    ${escapeHtml(line)}\n`;
      }
    });
  }

  yaml += `  <span class="yaml-key">tasks</span>:\n`;

  tasks.forEach((t, idx) => {
    const moduleInfo = MODULES.find(m => m.id === t.module);
    yaml += `    <span class="yaml-dash">-</span> <span class="yaml-key">name</span>: <span class="yaml-string">${escapeYaml(t.name || `${moduleInfo.label} task ${idx + 1}`)}</span>\n`;
    const nonEmpty = Object.entries(t.params).filter(([,v]) => v !== '');
    if (nonEmpty.length <= 1) {
      const [k, v] = nonEmpty[0] || ['', ''];
      const key = t.module;
      yaml += `      <span class="yaml-key">${key}</span>:\n`;
      if (v) {
        yaml += `        <span class="yaml-key">${k}</span>: ${formatYamlValue(v)}\n`;
      }
    } else {
      const key = t.module;
      yaml += `      <span class="yaml-key">${key}</span>:\n`;
      nonEmpty.forEach(([k, v]) => {
        yaml += `        <span class="yaml-key">${k}</span>: ${formatYamlValue(v)}\n`;
      });
    }
  });

  output.innerHTML = yaml;
}

function formatYamlValue(val) {
  if (val === 'yes' || val === 'no') return `<span class="yaml-bool">${val}</span>`;
  if (/^\d+$/.test(val)) return `<span class="yaml-int">${val}</span>`;
  return `<span class="yaml-string">${escapeYaml(val)}</span>`;
}

function escapeYaml(s) {
  return escapeHtml(s);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getRawYaml() {
  const playName = document.getElementById('play-name').value || 'play';
  const hosts = document.getElementById('play-hosts').value || 'all';
  const become = document.getElementById('play-become').value;
  const varsText = document.getElementById('play-vars').value.trim();

  let yaml = '---\n';
  yaml += `- name: ${playName}\n`;
  yaml += `  hosts: ${hosts}\n`;
  yaml += `  become: ${become}\n`;

  if (varsText) {
    yaml += `  vars:\n`;
    varsText.split('\n').forEach(line => {
      if (line.trim()) yaml += `    ${line}\n`;
    });
  }

  yaml += `  tasks:\n`;

  tasks.forEach((t, idx) => {
    const moduleInfo = MODULES.find(m => m.id === t.module);
    yaml += `    - name: ${t.name || `${moduleInfo.label} task ${idx + 1}`}\n`;
    const nonEmpty = Object.entries(t.params).filter(([,v]) => v !== '');
    const key = t.module;
    yaml += `      ${key}:\n`;
    nonEmpty.forEach(([k, v]) => {
      const formatted = /^\d+$/.test(v) ? v : v;
      yaml += `        ${k}: ${formatted}\n`;
    });
  });

  return yaml;
}

function copyYaml() {
  const yaml = getRawYaml();
  navigator.clipboard.writeText(yaml).then(() => {
    const btn = document.querySelector('.terminal-header .btn-success');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-check"></i>';
    setTimeout(() => btn.innerHTML = orig, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = yaml;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function downloadYaml() {
  const yaml = getRawYaml();
  const blob = new Blob([yaml], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'playbook.yml';
  a.click();
  URL.revokeObjectURL(url);
}

// Auto-render on config changes
['play-name', 'play-hosts', 'play-become', 'play-vars'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderYaml);
});

renderModules();
renderTasks();
renderYaml();
</script>
