<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Port Scanner</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.input-field{background:#18181b;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:0.9rem;padding:0.625rem 0.75rem;border-radius:0.5rem;width:100%;transition:all .2s}
.input-field:focus{outline:none;border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.input-field:hover{border-color:#3f3f46}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.btn{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f0f11;border:none;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:0.5rem}
.btn:hover{opacity:0.9}
.btn:active{opacity:0.8}
.btn-outline{background:#18181b;border:1px solid #27272a;color:#d4d4d8;font-family:'Inter',sans-serif;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-outline:hover{background:#27272a;border-color:#2dd4bf;color:#2dd4bf}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#a1a1aa;margin-bottom:0.375rem}
.preset-btn{background:#18181b;border:1px solid #27272a;color:#d4d4d8;font-family:'Fira Code',monospace;font-size:0.75rem;padding:0.25rem 0.6rem;border-radius:0.375rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.preset-btn:hover{background:#27272a;border-color:#2dd4bf;color:#2dd4bf}
.progress-bar{height:6px;background:#27272a;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2dd4bf,#06b6d4);border-radius:3px;transition:width .15s;width:0%}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:0.5rem 0.75rem;border-bottom:1px solid #27272a;color:#a1a1aa;font-weight:600;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em}
td{padding:0.5rem 0.75rem;border-bottom:1px solid #27272a;font-family:'Fira Code',monospace;font-size:0.8rem}
.status-open{color:#22c55e}
.status-closed{color:#ef4444}
.status-filtered{color:#f59e0b}
</style>
</head>
<body>
<div class="max-w-4xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-solid fa-network-wired text-[#2dd4bf] text-2xl"></i>
      Port Scanner
    </h1>
    <p class="text-[#a1a1aa] text-sm">Simulated port scan with common service database</p>
  </header>

  <div class="card mb-6">
    <div class="card-title"><i class="fa-regular fa-gear mr-2"></i>Target & Range</div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
      <div>
        <label>Host / IP</label>
        <input id="hostInput" class="input-field" type="text" placeholder="e.g. 192.168.1.1" value="10.0.0.1">
      </div>
      <div>
        <label>Start Port</label>
        <input id="startPort" class="input-field" type="number" min="1" max="65535" value="1">
      </div>
      <div>
        <label>End Port</label>
        <input id="endPort" class="input-field" type="number" min="1" max="65535" value="1024">
      </div>
    </div>
    <div class="mb-4">
      <label class="mb-2">Quick Presets</label>
      <div class="flex flex-wrap gap-1.5">
        <button class="preset-btn" data-start="1" data-end="1024">Well-known (1-1024)</button>
        <button class="preset-btn" data-start="80" data-end="80">HTTP</button>
        <button class="preset-btn" data-start="443" data-end="443">HTTPS</button>
        <button class="preset-btn" data-start="22" data-end="22">SSH</button>
        <button class="preset-btn" data-start="21" data-end="21">FTP</button>
        <button class="preset-btn" data-start="25" data-end="25">SMTP</button>
        <button class="preset-btn" data-start="3306" data-end="3306">MySQL</button>
        <button class="preset-btn" data-start="5432" data-end="5432">PostgreSQL</button>
        <button class="preset-btn" data-start="27017" data-end="27017">MongoDB</button>
        <button class="preset-btn" data-start="6379" data-end="6379">Redis</button>
        <button class="preset-btn" data-start="3389" data-end="3389">RDP</button>
        <button class="preset-btn" data-start="1" data-end="65535">Full Range</button>
      </div>
    </div>
    <div class="flex gap-3 items-center">
      <button class="btn" id="scanBtn"><i class="fa-solid fa-play"></i> Start Scan</button>
      <button class="btn-outline" id="stopBtn" disabled><i class="fa-solid fa-stop"></i> Stop</button>
    </div>
  </div>

  <div id="progressSection" class="card mb-6 hidden">
    <div class="card-title"><i class="fa-regular fa-hourglass-half mr-2"></i>Scan Progress</div>
    <div class="progress-bar mb-2"><div class="progress-fill" id="progressFill"></div></div>
    <div class="flex justify-between text-xs text-[#a1a1aa]">
      <span id="progressText">0 / 0 ports scanned</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div id="resultsSection" class="card hidden">
    <div class="card-title flex items-center justify-between">
      <span><i class="fa-regular fa-rectangle-list mr-2"></i>Results</span>
      <span class="text-xs text-[#a1a1aa]" id="resultSummary"></span>
    </div>
    <div id="resultsTable" style="max-height:400px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#27272a transparent"></div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> Port Scanner</a>
  </footer>
</div>

function getServiceName(port) {
  return PORT_SERVICES[port] || 'Unknown';
}

function isCommonOpen(port) {
  return COMMON_OPEN.includes(port);
}

var scanning = false;
var scanBtn = document.getElementById('scanBtn');
var stopBtn = document.getElementById('stopBtn');
var progressSection = document.getElementById('progressSection');
var resultsSection = document.getElementById('resultsSection');
var progressFill = document.getElementById('progressFill');
var progressText = document.getElementById('progressText');
var progressPct = document.getElementById('progressPct');
var resultsTable = document.getElementById('resultsTable');
var resultSummary = document.getElementById('resultSummary');
var hostInput = document.getElementById('hostInput');
var startPort = document.getElementById('startPort');
var endPort = document.getElementById('endPort');

document.querySelectorAll('.preset-btn').forEach(function(btn){
  btn.onclick = function(){
    startPort.value = btn.dataset.start;
    endPort.value = btn.dataset.end;
  };
});

function statusClass(s) {
  if (s === 'open') return 'status-open';
  if (s === 'closed') return 'status-closed';
  return 'status-filtered';
}

function statusIcon(s) {
  if (s === 'open') return '<i class="fa-regular fa-circle-check"></i>';
  if (s === 'closed') return '<i class="fa-regular fa-circle-xmark"></i>';
  return '<i class="fa-regular fa-circle-question"></i>';
}

function simulateScan(host, start, end, onProgress, onComplete) {
  var total = end - start + 1;
  var results = [];
  var aborted = false;
  var batch = Math.min(100, total);
  var done = 0;

  function processBatch() {
    if (aborted) { onComplete(null); return; }
    var count = Math.min(batch, total - done);
    for (var i = 0; i < count; i++) {
      var port = start + done + i;
      var open = isCommonOpen(port) && Math.random() < 0.3;
      var closed = !isCommonOpen(port) && Math.random() < 0.7;
      var status = open ? 'open' : (closed ? 'closed' : 'filtered');
      results.push({ port: port, service: getServiceName(port), status: status });
    }
    done += count;
    onProgress(done, total);
    if (done >= total) {
      onComplete(results);
    } else {
      setTimeout(processBatch, 50);
    }
  }

  processBatch();
  return function() { aborted = true; };
}

var cancelScan = null;

scanBtn.onclick = function(){
  var host = hostInput.value.trim();
  var s = parseInt(startPort.value);
  var e = parseInt(endPort.value);
  if (!host) { alert('Please enter a host or IP address'); return; }
  if (isNaN(s) || isNaN(e) || s < 1 || e > 65535 || s > e) { alert('Invalid port range (1-65535)'); return; }
  var total = e - s + 1;
  if (total > 5000 && !confirm('Scanning ' + total + ' ports may take a while. Continue?')) return;

  resultsSection.classList.add('hidden');
  resultsTable.innerHTML = '';
  progressSection.classList.remove('hidden');
  progressFill.style.width = '0%';
  progressText.textContent = '0 / ' + total + ' ports scanned';
  progressPct.textContent = '0%';
  scanBtn.disabled = true;
  stopBtn.disabled = false;

  cancelScan = simulateScan(host, s, e,
    function(done, total) {
      var pct = Math.round(done / total * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = done + ' / ' + total + ' ports scanned';
      progressPct.textContent = pct + '%';
    },
    function(results) {
      scanBtn.disabled = false;
      stopBtn.disabled = true;
      if (results === null) {
        progressText.textContent = 'Scan cancelled';
        return;
      }
      progressFill.style.width = '100%';
      progressPct.textContent = '100%';
      var openCount = results.filter(function(r){ return r.status === 'open'; }).length;
      var closedCount = results.filter(function(r){ return r.status === 'closed'; }).length;
      var filteredCount = results.filter(function(r){ return r.status === 'filtered'; }).length;
      resultSummary.textContent = openCount + ' open, ' + closedCount + ' closed, ' + filteredCount + ' filtered';

      var html = '<table><thead><tr><th>Port</th><th>Service</th><th>Status</th></tr></thead><tbody>';
      var sorted = results.filter(function(r){ return r.status === 'open'; }).concat(
        results.filter(function(r){ return r.status === 'filtered'; }),
        results.filter(function(r){ return r.status === 'closed'; })
      );
      sorted.forEach(function(r){
        html += '<tr><td class="fira">' + r.port + '</td><td>' + r.service + '</td><td class="' + statusClass(r.status) + '">' + statusIcon(r.status) + ' ' + r.status.charAt(0).toUpperCase() + r.status.slice(1) + '</td></tr>';
      });
      html += '</tbody></table>';
      resultsTable.innerHTML = html;
      resultsSection.classList.remove('hidden');
    }
  );
};

stopBtn.onclick = function(){
  if (cancelScan) { cancelScan(); cancelScan = null; }
  scanBtn.disabled = false;
  stopBtn.disabled = true;
  progressText.textContent = 'Scan stopped';
};
