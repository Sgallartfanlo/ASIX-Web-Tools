<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML <-> JSON Converter</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.btn{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f0f11;border:none;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:0.5rem}
.btn:hover{opacity:0.9}
.btn-outline{background:#18181b;border:1px solid #27272a;color:#d4d4d8;font-family:'Inter',sans-serif;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-outline:hover{background:#27272a;border-color:#2dd4bf;color:#2dd4bf}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#a1a1aa;margin-bottom:0.375rem}
.editor-area{width:100%;min-height:40vh;background:#0f0f11;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:0.8rem;padding:0.75rem;resize:vertical;outline:none;transition:border-color .2s;border-radius:0.5rem;line-height:1.5;white-space:pre;overflow-wrap:normal;overflow-x:auto}
.editor-area:focus{border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.editor-area.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,0.15)}
.split-pane{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.split-pane{grid-template-columns:1fr}}
.error-bar{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.8rem;color:#ef4444;font-family:'Fira Code',monospace}
</style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-solid fa-code-compare text-[#2dd4bf] text-2xl"></i>
      YAML <-> JSON Converter
    </h1>
    <p class="text-[#a1a1aa] text-sm">Convert between YAML and JSON formats</p>
  </header>

  <div class="flex flex-wrap gap-2 mb-4 justify-center">
    <button class="btn" id="toJsonBtn"><i class="fa-solid fa-arrow-right"></i> YAML -> JSON</button>
    <button class="btn" id="toYamlBtn"><i class="fa-solid fa-arrow-left"></i> JSON -> YAML</button>
    <button class="btn-outline" id="sampleYamlBtn"><i class="fa-regular fa-file-lines"></i> Sample YAML</button>
    <button class="btn-outline" id="sampleJsonBtn"><i class="fa-regular fa-file-code"></i> Sample JSON</button>
    <button class="btn-outline" id="clearBtn"><i class="fa-regular fa-trash-can"></i> Clear</button>
  </div>

  <div id="errorBar" class="error-bar hidden mb-4"><i class="fa-regular fa-circle-exclamation mr-2"></i><span id="errorText"></span></div>

  <div class="split-pane">
    <div class="card">
      <div class="card-title flex items-center justify-between">
        <span><i class="fa-regular fa-pen-to-square mr-2"></i>YAML</span>
        <span class="text-xs text-[#52525b]">.yaml / .yml</span>
      </div>
      <textarea id="yamlEditor" class="editor-area" placeholder="Paste YAML here..."></textarea>
    </div>
    <div class="card">
      <div class="card-title flex items-center justify-between">
        <span><i class="fa-regular fa-brackets-curly mr-2"></i>JSON</span>
        <span class="text-xs text-[#52525b]">.json</span>
      </div>
      <textarea id="jsonEditor" class="editor-area" placeholder="Paste JSON here..."></textarea>
    </div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> YAML <-> JSON Converter</a>
  </footer>
</div>

<script>
var yamlEditor = document.getElementById('yamlEditor');
var jsonEditor = document.getElementById('jsonEditor');
var errorBar = document.getElementById('errorBar');
var errorText = document.getElementById('errorText');

function showError(msg) {
  errorBar.classList.remove('hidden');
  errorText.textContent = msg;
  yamlEditor.classList.add('error');
  jsonEditor.classList.add('error');
}

function hideError() {
  errorBar.classList.add('hidden');
  yamlEditor.classList.remove('error');
  jsonEditor.classList.remove('error');
}

document.getElementById('toJsonBtn').onclick = function(){
  hideError();
  var yaml = yamlEditor.value.trim();
  if (!yaml) { showError('Please enter YAML content'); return; }
  try {
    var obj = jsyaml.load(yaml);
    jsonEditor.value = JSON.stringify(obj, null, 2);
  } catch(e) {
    showError('YAML Parse Error: ' + e.message);
  }
};

document.getElementById('toYamlBtn').onclick = function(){
  hideError();
  var json = jsonEditor.value.trim();
  if (!json) { showError('Please enter JSON content'); return; }
  try {
    var obj = JSON.parse(json);
    yamlEditor.value = jsyaml.dump(obj, { indent: 2, lineWidth: -1, noRefs: true, sortKeys: false });
  } catch(e) {
    showError('JSON Parse Error: ' + e.message);
  }
};

document.getElementById('sampleYamlBtn').onclick = function(){
  hideError();
  yamlEditor.value = '# Sample Kubernetes Deployment\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: web-app\n  labels:\n    app: web\n    tier: frontend\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: web\n  template:\n    metadata:\n      labels:\n        app: web\n    spec:\n      containers:\n        - name: nginx\n          image: nginx:1.25\n          ports:\n            - containerPort: 80\n          env:\n            - name: NODE_ENV\n              value: production\n          resources:\n            limits:\n              cpu: "500m"\n              memory: "512Mi"\n---\n# Config Map\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: app-config\ndata:\n  database_url: postgres://db:5432/app\n  cache_ttl: "3600"\n  debug: "false"\n';
};

document.getElementById('sampleJsonBtn').onclick = function(){
  hideError();
  jsonEditor.value = JSON.stringify({
    "name": "web-app",
    "version": "2.0.0",
    "description": "A sample web application configuration",
    "repository": {
      "type": "git",
      "url": "https://github.com/example/web-app.git"
    },
    "scripts": {
      "start": "node server.js",
      "build": "webpack --mode production",
      "test": "jest --coverage"
    },
    "dependencies": {
      "express": "^4.18.0",
      "react": "^18.2.0",
      "lodash": "^4.17.21"
    },
    "devDependencies": {
      "webpack": "^5.88.0",
      "jest": "^29.5.0",
      "typescript": "^5.1.0"
    },
    "engines": {
      "node": ">=18.0.0",
      "npm": ">=9.0.0"
    }
  }, null, 2);
};

document.getElementById('clearBtn').onclick = function(){
  yamlEditor.value = '';
  jsonEditor.value = '';
  hideError();
};

// Auto-detect direction: if YAML has content, convert to JSON; else JSON to YAML
yamlEditor.oninput = function() {
  if (yamlEditor.value.trim()) {
    jsonEditor.value = '';
    hideError();
  }
};
jsonEditor.oninput = function() {
  if (jsonEditor.value.trim()) {
    yamlEditor.value = '';
    hideError();
  }
};

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'j') {
    e.preventDefault();
    document.getElementById('toJsonBtn').click();
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'y') {
    e.preventDefault();
    document.getElementById('toYamlBtn').click();
  }
});
</script>
</body>
</html>
