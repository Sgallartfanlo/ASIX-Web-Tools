<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Previewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
.editor-area{width:100%;height:100%;min-height:60vh;background:#0f0f11;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:0.85rem;padding:1rem;resize:none;outline:none;transition:border-color .2s;border-radius:0.5rem;line-height:1.6}
.editor-area:focus{border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.preview-area{padding:0;min-height:60vh;overflow-y:auto}
.preview-area h1{font-size:1.75rem;font-weight:700;margin-bottom:0.5rem;color:#e4e4e7;border-bottom:1px solid #27272a;padding-bottom:0.5rem}
.preview-area h2{font-size:1.35rem;font-weight:600;margin-bottom:0.5rem;color:#e4e4e7;border-bottom:1px solid #27272a;padding-bottom:0.35rem}
.preview-area h3{font-size:1.1rem;font-weight:600;margin-bottom:0.4rem;color:#d4d4d8}
.preview-area p{margin-bottom:0.75rem;line-height:1.7;color:#d4d4d8}
.preview-area ul,.preview-area ol{padding-left:1.5rem;margin-bottom:0.75rem;color:#d4d4d8}
.preview-area li{margin-bottom:0.25rem}
.preview-area code{background:#0f0f11;border:1px solid #27272a;border-radius:0.25rem;padding:0.125rem 0.375rem;font-family:'Fira Code',monospace;font-size:0.8rem;color:#2dd4bf}
.preview-area pre{background:#0f0f11;border:1px solid #27272a;border-radius:0.5rem;padding:0.75rem;margin-bottom:0.75rem;overflow-x:auto}
.preview-area pre code{background:none;border:none;padding:0;color:#e4e4e7;font-size:0.8rem;line-height:1.5}
.preview-area blockquote{border-left:3px solid #2dd4bf;padding:0.5rem 0 0.5rem 1rem;margin-bottom:0.75rem;color:#a1a1aa;background:rgba(45,212,191,0.03)}
.preview-area table{width:100%;border-collapse:collapse;margin-bottom:0.75rem}
.preview-area th,.preview-area td{border:1px solid #27272a;padding:0.5rem 0.75rem;text-align:left;font-size:0.85rem}
.preview-area th{background:#0f0f11;color:#a1a1aa;font-weight:600}
.preview-area td{color:#d4d4d8}
.preview-area a{color:#2dd4bf;text-decoration:none}
.preview-area a:hover{text-decoration:underline}
.preview-area hr{border:none;border-top:1px solid #27272a;margin:1rem 0}
.preview-area img{max-width:100%;border-radius:0.5rem}
.preview-area strong{color:#e4e4e7}
.preview-area em{color:#d4d4d8}
.btn{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f0f11;border:none;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:0.5rem}
.btn:hover{opacity:0.9}
.btn-outline{background:#18181b;border:1px solid #27272a;color:#d4d4d8;font-family:'Inter',sans-serif;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-outline:hover{background:#27272a;border-color:#2dd4bf;color:#2dd4bf}
.split-pane{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.split-pane{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-brands fa-markdown text-[#2dd4bf] text-2xl"></i>
      Markdown Previewer
    </h1>
    <p class="text-[#a1a1aa] text-sm">Write Markdown on the left, see formatted preview on the right</p>
  </header>

  <div class="flex gap-2 mb-4">
    <button class="btn-outline" id="sampleBtn"><i class="fa-regular fa-file-lines"></i> Load Sample</button>
    <button class="btn-outline" id="clearBtn"><i class="fa-regular fa-trash-can"></i> Clear</button>
  </div>

  <div class="split-pane">
    <div class="card" style="padding:0.75rem">
      <div class="card-title"><i class="fa-regular fa-pen-to-square mr-2"></i>Editor</div>
      <textarea id="editor" class="editor-area" placeholder="Type Markdown here..."></textarea>
    </div>
    <div class="card" style="padding:0.75rem">
      <div class="card-title"><i class="fa-regular fa-eye mr-2"></i>Preview</div>
      <div id="preview" class="preview-area"></div>
    </div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> Markdown Previewer</a>
  </footer>
</div>

<script>
var editor = document.getElementById('editor');
var preview = document.getElementById('preview');

function update() {
  var md = editor.value;
  try {
    preview.innerHTML = marked.parse(md);
  } catch(e) {
    preview.innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>';
  }
}

editor.oninput = update;

document.getElementById('sampleBtn').onclick = function(){
  editor.value = '# Welcome to Markdown Previewer\n\n## Headings\n\n# H1\n## H2\n### H3\n\n## Text Formatting\n\n**Bold text**, *italic text*, ~~strikethrough~~, and `inline code`.\n\n## Lists\n\n### Unordered\n- Item 1\n- Item 2\n  - Nested item\n  - Another nested\n- Item 3\n\n### Ordered\n1. First step\n2. Second step\n3. Third step\n\n## Code Blocks\n\n```javascript\nfunction hello() {\n  console.log("Hello, world!");\n}\n```\n\n```python\ndef fib(n):\n    if n <= 1:\n        return n\n    return fib(n-1) + fib(n-2)\n```\n\n## Blockquotes\n\n> This is a blockquote.\n> It can span multiple lines.\n\n## Tables\n\n| Command | Description |\n|---------|-------------|\n| `git add` | Stage changes |\n| `git commit` | Commit changes |\n| `git push` | Push to remote |\n\n## Links & Images\n\n[Visit GitHub](https://github.com)\n\n## Horizontal Rule\n\n---\n\n## Typography\n\nParagraph text with **strong emphasis**, *italic emphasis*, and `code snippets`. Lists, tables, and blockquotes all render cleanly in the dark theme.\n';
  update();
};

document.getElementById('clearBtn').onclick = function(){
  editor.value = '';
  update();
};

marked.setOptions({
  breaks: true,
  gfm: true
});

editor.value = '# Markdown Previewer\n\n## Getting Started\n\nType **Markdown** on the left panel.\nSee the formatted **preview** update in real time on the right.\n\n### Features\n\n- Real-time preview\n- GitHub Flavored Markdown\n- Syntax-highlighted code blocks\n- Tables, lists, blockquotes\n\n```\nTry editing this text!\n```\n\n> Happy writing!';
update();
</script>
</body>
</html>
