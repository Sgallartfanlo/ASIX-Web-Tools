.game-btn i{width:1.5rem;text-align:center;font-size:1.1rem}
.game-area{min-height:400px}
.input-game{background:#141417;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:1rem;padding:0.5rem 0.75rem;border-radius:0.375rem;transition:all .2s}
.input-game:focus{outline:none;border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
.btn-primary{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f0f11;border:none;padding:0.5rem 1.25rem;border-radius:0.375rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{background:#27272a;color:#d4d4d8;border:1px solid #3f3f46;padding:0.5rem 1.25rem;border-radius:0.375rem;font-weight:500;font-size:0.875rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-secondary:hover{background:#3f3f46;border-color:#52525b}
.btn-sm{padding:0.375rem 0.75rem;font-size:0.75rem}
.hangman-draw{font-family:'Fira Code',monospace;font-size:1rem;line-height:1.2;color:#2dd4bf;white-space:pre}
.letter-box{display:inline-flex;align-items:center;justify-content:center;width:2.25rem;height:2.75rem;border-bottom:3px solid #2dd4bf;margin:0 0.25rem;font-family:'Fira Code',monospace;font-size:1.5rem;font-weight:700;color:#e4e4e7;transition:all .2s}
.letter-box.revealed{border-color:#fbbf24;color:#fbbf24}

.key-btn:hover{background:#3f3f46;border-color:#2dd4bf;color:#2dd4bf}

.key-btn.wrong{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#ef4444}

.mine-cell:hover{background:#27272a}
.mine-cell.revealed{background:#141417;cursor:default}
.mine-cell.revealed:hover{background:#141417}
.mine-cell.mine{background:rgba(239,68,68,0.2);border-color:#ef4444}
.mine-cell.flagged{background:rgba(251,191,36,0.1);border-color:#fbbf24;color:#fbbf24}

.mine-cell.revealed.n2{color:#22c55e}

.mine-cell.revealed.n4{color:#a855f7}

.mine-cell.revealed.n6{color:#06b6d4}
.mine-cell.revealed.n7{color:#1e293b}
.mine-cell.revealed.n8{color:#64748b}

.t2048-cell.t16{background:rgba(251,191,36,0.35);color:#fbbf24}

.t2048-cell.t64{background:rgba(239,68,68,0.35);color:#ef4444}

.t2048-cell.t256{background:rgba(168,85,247,0.35);color:#a855f7}
.t2048-cell.t512{background:rgba(168,85,247,0.45);color:#a855f7}

    <p class="text-[#52525b] text-xs mt-2">Jocs &mdash; Col·lecció de jocs clàssics</p>

</div>

let hangmanState = {};
function initHangman() {
  const idx = Math.floor(Math.random() * HANGMAN_WORDS.length);
  const data = HANGMAN_WORDS[idx];
  hangmanState = { word: data.word, hint: data.hint, guessed: [], wrong: 0, maxWrong: 6 };
  renderHangman();
}
function renderHangman() {
  const s = hangmanState;
  const revealed = s.word.split('').every(l => s.guessed.includes(l));
  const lost = s.wrong >= s.maxWrong;
  const parts = ['','  O','  O\n  |','  O\n /|','  O\n /|\\\\','  O\n /|\\\\\n /','  O\n /|\\\\\n / \\\\'];
  let html = '<div class="flex flex-col md:flex-row gap-6 items-start"><div class="text-center"><pre class="hangman-draw text-left">' + parts[s.wrong] + '</pre></div><div class="flex-1 w-full"><div class="flex justify-center flex-wrap gap-1 mb-4">';
  s.word.split('').forEach(l => { html += '<span class="letter-box' + (s.guessed.includes(l)?' revealed':'') + '">' + (s.guessed.includes(l)?l:'') + '</span>'; });
  html += '</div><div class="text-center text-sm text-[#a1a1aa] mb-4"><i class="fa-solid fa-lightbulb mr-1 text-[#fbbf24]"></i> ' + s.hint + '</div><div class="text-center text-sm mb-3">Errors: ' + s.wrong + '/' + s.maxWrong + '</div>';
  if (revealed) html += '<div class="text-center text-[#2dd4bf] font-bold text-lg mb-4"><i class="fa-solid fa-trophy mr-1"></i> Has guanyat!</div>';
  else if (lost) html += '<div class="text-center text-[#ef4444] font-bold text-lg mb-4"><i class="fa-solid fa-skull mr-1"></i> Has perdut! La paraula era: <span class="text-[#fbbf24]">' + s.word + '</span></div>';
  else {
    html += '<div class="flex flex-wrap justify-center gap-1 max-w-md mx-auto mb-4">';
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
      const used = s.guessed.includes(l);
      html += '<button class="key-btn' + (used?' used':'') + (used&&!s.word.includes(l)?' wrong':'') + '" data-letter="' + l + '"' + (used?' disabled':'') + '>' + l + '</button>';
    });
    html += '</div>';
  }
  html += '<div class="text-center"><button class="btn-primary btn-sm" onclick="initHangman()"><i class="fa-solid fa-rotate mr-1"></i> Nova paraula</button></div></div></div>';
  document.getElementById('gameArea').innerHTML = html;
  if (!revealed && !lost) {
    document.querySelectorAll('.key-btn:not(.used)').forEach(btn => {
      btn.addEventListener('click', () => {
        const letter = btn.dataset.letter;
        hangmanState.guessed.push(letter);
        if (!hangmanState.word.includes(letter)) hangmanState.wrong++;
        renderHangman();
      });
    });
  }
}
let mineState = {};
function initMinesweeper() {
  const rows=9, cols=9, mines=10;
  const grid=Array.from({length:rows},()=>Array(cols).fill(0));
  const pos=new Set();
  while(pos.size<mines){const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);pos.add(r+','+c);grid[r][c]=-1;}
  pos.forEach(p=>{const[r,c]=p.split(',').map(Number);for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]!==-1)grid[nr][nc]++;}});
  mineState={grid,rows,cols,mines,revealed:Array.from({length:rows},()=>Array(cols).fill(false)),flagged:Array.from({length:rows},()=>Array(cols).fill(false)),gameOver:false,won:false};
  renderMinesweeper();
}
function renderMinesweeper(){
  const{grid,rows,cols,mines,revealed,flagged,gameOver,won}=mineState;
  let flagCount=0;flagged.forEach(r=>r.forEach(f=>f&&flagCount++));
  let html='<div class="flex items-center justify-between mb-4"><div class="text-sm text-[#a1a1aa]"><i class="fa-solid fa-bomb mr-1"></i> Mines: '+mines+'</div><div class="text-sm text-[#a1a1aa]"><i class="fa-solid fa-flag mr-1"></i> '+flagCount+'/'+mines+'</div><button class="btn-primary btn-sm" onclick="initMinesweeper()"><i class="fa-solid fa-rotate mr-1"></i> Nou</button></div><div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat('+cols+',2rem)">';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const rev=revealed[r][c]||(gameOver&&grid[r][c]===-1)||(won&&grid[r][c]!==-1);
    const fl=flagged[r][c]&&!gameOver;
    let content='',cls='mine-cell';
    if(rev){cls+=' revealed';if(grid[r][c]===-1){cls+=' mine';content='<i class="fa-solid fa-bomb" style="font-size:0.7rem;color:#ef4444"></i>';}else if(grid[r][c]>0){content=grid[r][c];cls+=' n'+grid[r][c];}}
    else if(fl){cls+=' flagged';content='<i class="fa-solid fa-flag" style="font-size:0.65rem"></i>';}
    html+='<div class="'+cls+'" data-r="'+r+'" data-c="'+c+'">'+content+'</div>';
  }
  html+='</div></div>';
  if(gameOver)html+='<div class="text-center mt-4 '+(won?'text-[#2dd4bf]':'text-[#ef4444]')+' font-bold"><i class="fa-solid '+(won?'fa-trophy':'fa-skull')+' mr-1"></i> '+(won?'Has guanyat!':'Has perdut!')+'</div>';
  html+='<div class="text-center mt-2 text-xs text-[#52525b]">Clic esquerre: descobrir &middot; Clic dret: bandera</div>';
  document.getElementById('gameArea').innerHTML=html;
  if(!gameOver){
    document.querySelectorAll('.mine-cell').forEach(cell=>{
      cell.addEventListener('click',()=>{
        const r=parseInt(cell.dataset.r),c=parseInt(cell.dataset.c);
        if(mineState.revealed[r][c]||mineState.flagged[r][c]||mineState.gameOver)return;
        if(mineState.grid[r][c]===-1){mineState.gameOver=true;renderMinesweeper();return;}
        revealCell(r,c);checkWin();renderMinesweeper();
      });
      cell.addEventListener('contextmenu',e=>{e.preventDefault();const r=parseInt(cell.dataset.r),c=parseInt(cell.dataset.c);if(mineState.revealed[r][c]||mineState.gameOver)return;mineState.flagged[r][c]=!mineState.flagged[r][c];renderMinesweeper();});
    });
  }
}
function revealCell(r,c){
  const{grid,rows,cols,revealed,flagged}=mineState;
  if(revealed[r][c]||flagged[r][c]||grid[r][c]===-1)return;
  revealed[r][c]=true;
  if(grid[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols)revealCell(nr,nc);}
}
function checkWin(){
  const{grid,rows,cols,revealed}=mineState;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]!==-1&&!revealed[r][c])return;
  mineState.won=true;mineState.gameOver=true;
}
let tttState={};
function initTicTacToe(){tttState={board:Array(9).fill(null),turn:'X',gameOver:false};renderTicTacToe();}
function renderTicTacToe(){
  const{board,turn,gameOver}=tttState;
  const win=checkTttWin(board);const draw=!win&&board.every(c=>c!==null);
  let html='<div class="text-center mb-4 text-sm text-[#a1a1aa]">';
  if(win)html+='<span class="text-[#2dd4bf] font-bold text-lg"><i class="fa-solid fa-trophy mr-1"></i> '+win.player+' ha guanyat!</span>';
  else if(draw)html+='<span class="text-[#fbbf24] font-bold text-lg"><i class="fa-solid fa-hand mr-1"></i> Empate!</span>';
  else html+='Torn de <span class="'+(turn==='X'?'text-[#2dd4bf]':'text-[#fbbf24]')+' font-bold">'+turn+'</span>'+(turn==='O'?' <span class="text-xs text-[#52525b]">(IA)</span>':'');
  html+='</div><div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat(3,5rem)">';
  for(let i=0;i<9;i++){
    const v=board[i];let cls='ttt-cell';
    if(v==='X')cls+=' x';else if(v==='O')cls+=' o';
    if(win&&win.indices.includes(i))cls+=' win';
    html+='<div class="'+cls+'" data-idx="'+i+'">'+(v||'')+'</div>';
  }
  html+='</div></div><div class="text-center mt-4"><button class="btn-primary btn-sm" onclick="initTicTacToe()"><i class="fa-solid fa-rotate mr-1"></i> Reiniciar</button></div>';
  document.getElementById('gameArea').innerHTML=html;
  if(!gameOver&&!win&&!draw){
    document.querySelectorAll('.ttt-cell:empty').forEach(cell=>{
      cell.addEventListener('click',()=>{
        const idx=parseInt(cell.dataset.idx);
        if(tttState.board[idx]!==null||tttState.turn==='O'||tttState.gameOver)return;
        tttState.board[idx]='X';tttState.turn='O';renderTicTacToe();setTimeout(tttMove,300);
      });
    });
  }
}
function checkTttWin(b){const l=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(const[a,b1,c]of l)if(b[a]&&b[a]===b[b1]&&b[a]===b[c])return{player:b[a],indices:[a,b1,c]};return null;}
function tttMove(){
  const{board,gameOver}=tttState;if(gameOver)return;
  const win=checkTttWin(board),draw=!win&&board.every(c=>c!==null);
  if(win||draw)return;
  const empty=board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
  if(!empty.length)return;
  let best=-Infinity,bestMove=empty[0];
  for(const m of empty){board[m]='O';const s=minimax(board,0,false);board[m]=null;if(s>best){best=s;bestMove=m;}}
  board[bestMove]='O';tttState.turn='X';renderTicTacToe();
}
function minimax(b,d,isMax){
  const w=checkTttWin(b);if(w)return w.player==='O'?10-d:d-10;
  if(b.every(c=>c!==null))return 0;
  if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(b[i]!==null)continue;b[i]='O';best=Math.max(best,minimax(b,d+1,false));b[i]=null;}return best;}
  else{let best=Infinity;for(let i=0;i<9;i++){if(b[i]!==null)continue;b[i]='X';best=Math.min(best,minimax(b,d+1,true));b[i]=null;}return best;}
}

  const head=snake[0];
  const nr=head.r+dr,nc=head.c+dc;
  if(nr<0||nr>=15||nc<0||nc>=15||snake.some(s=>s.r===nr&&s.c===nc)){snakeState.gameOver=true;if(snakeState.interval)clearInterval(snakeState.interval);renderSnake();return;}
  snake.unshift({r:nr,c:nc});
  if(nr===food.r&&nc===food.c){snakeState.score+=10;spawnSnakeFood();}else snake.pop();
}
function renderSnake(){
  const{grid,snake,food,score,gameOver}=snakeState;
  let html='<div class="flex items-center justify-between mb-4"><div class="text-sm text-[#a1a1aa]"><i class="fa-solid fa-star mr-1"></i> Puntuaci\xf3: '+score+'</div><div class="flex gap-2">';
  html+='<button class="btn-primary btn-sm" onclick="initSnake()"><i class="fa-solid fa-rotate mr-1"></i> Nou</button></div></div>';
  html+='<div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat(15,1.25rem);gap:2px;background:#141417;padding:4px;border-radius:8px">';
  for(let r=0;r<15;r++)for(let c=0;c<15;c++){
    const isHead=snake[0].r===r&&snake[0].c===c;
    const isBody=snake.some(s=>s.r===r&&s.c===c);
    const isFood=food.r===r&&food.c===c;
    let cls='snake-cell';
    if(isHead)cls+=' head';
    else if(isBody)cls+=' body';
    else if(isFood)cls+=' food';
    html+='<div class="'+cls+'"></div>';
  }
  html+='</div></div>';
  if(gameOver)html+='<div class="text-center mt-4 text-[#ef4444] font-bold"><i class="fa-solid fa-skull mr-1"></i> Game Over! Puntuaci\xf3: '+score+'</div>';
  html+='<div class="text-center mt-2 text-xs text-[#52525b]">Fletxes del teclat per moure</div>';
  document.getElementById('gameArea').innerHTML=html;
}
document.addEventListener('keydown',(e)=>{
  if(!snakeState||!snakeState.snake)return;
  const k=e.key;
  if(k==='ArrowUp'&&snakeState.dir.dr!==1)snakeState.nextDir={dr:-1,dc:0};
  else if(k==='ArrowDown'&&snakeState.dir.dr!==-1)snakeState.nextDir={dr:1,dc:0};
  else if(k==='ArrowLeft'&&snakeState.dir.dc!==1)snakeState.nextDir={dr:0,dc:-1};
  else if(k==='ArrowRight'&&snakeState.dir.dc!==-1)snakeState.nextDir={dr:0,dc:1};
  e.preventDefault();
});

// ====== 2048 ======
let g2048State={};
function init2048(){
  const grid=Array.from({length:4},()=>Array(4).fill(0));
  g2048State={grid,score:0,gameOver:false};
  add2048Tile();add2048Tile();
  render2048();
}
function add2048Tile(){
  const{grid}=g2048State;
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push({r,c});
  if(!empty.length)return;
  const{r,c}=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}
function slide2048Row(row){
  let arr=row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){arr[i]*=2;g2048State.score+=arr[i];arr.splice(i+1,1);}
  }
  while(arr.length<4)arr.push(0);
  return arr;
}
function move2048(dir){
  const{grid,gameOver}=g2048State;
  if(gameOver)return;
  const before=JSON.stringify(grid);
  if(dir==='left')for(let r=0;r<4;r++)grid[r]=slide2048Row(grid[r]);
  else if(dir==='right')for(let r=0;r<4;r++){grid[r].reverse();grid[r]=slide2048Row(grid[r]);grid[r].reverse();}
  else if(dir==='up')for(let c=0;c<4;c++){const col=grid.map(r=>r[c]);const slid=slide2048Row(col);for(let r=0;r<4;r++)grid[r][c]=slid[r];}
  else if(dir==='down')for(let c=0;c<4;c++){const col=grid.map(r=>r[c]).reverse();const slid=slide2048Row(col).reverse();for(let r=0;r<4;r++)grid[r][c]=slid[r];}
  if(JSON.stringify(grid)!==before){add2048Tile();check2048();}
  render2048();
}
function check2048(){
  const{grid}=g2048State;
  let hasZero=false;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!grid[r][c])hasZero=true;else if(grid[r][c]===2048){g2048State.won=true;return;}}
  if(!hasZero){
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      if(c<3&&grid[r][c]===grid[r][c+1])return;
      if(r<3&&grid[r][c]===grid[r+1][c])return;
    }
    g2048State.gameOver=true;
  }
}
function render2048(){
  const{grid,score,gameOver,won}=g2048State;
  let html='<div class="flex items-center justify-between mb-4"><div class="text-sm text-[#a1a1aa]"><i class="fa-solid fa-star mr-1"></i> Puntuaci\xf3: '+score+'</div><button class="btn-primary btn-sm" onclick="init2048()"><i class="fa-solid fa-rotate mr-1"></i> Nou</button></div>';
  html+='<div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat(4,4.5rem);gap:0.5rem">';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c];
    let cls='t2048-cell';
    if(v)cls+=' t'+v;
    html+='<div class="'+cls+'">'+(v||'')+'</div>';
  }
  html+='</div></div>';
  if(won)html+='<div class="text-center mt-4 text-[#2dd4bf] font-bold text-lg"><i class="fa-solid fa-trophy mr-1"></i> Has guanyat! 2048!</div>';
  else if(gameOver)html+='<div class="text-center mt-4 text-[#ef4444] font-bold"><i class="fa-solid fa-skull mr-1"></i> Game Over!</div>';
  html+='<div class="text-center mt-2 text-xs text-[#52525b]">Fletxes del teclat per moure</div>';
  document.getElementById('gameArea').innerHTML=html;
}
document.addEventListener('keydown',(e)=>{
  if(!g2048State||!g2048State.grid)return;
  const k=e.key;
  if(k==='ArrowLeft')move2048('left');
  else if(k==='ArrowRight')move2048('right');
  else if(k==='ArrowUp')move2048('up');
  else if(k==='ArrowDown')move2048('down');
  else return;
  e.preventDefault();
});

// ====== CONNECTA 4 ======
let c4State={};
function initConnect4(){
  c4State={grid:Array.from({length:6},()=>Array(7).fill(0)),turn:1,moves:0,gameOver:false};
  renderConnect4();
}
function renderConnect4(){
  const{grid,turn,moves,gameOver,winner}=c4State;
  let html='<div class="flex items-center justify-between mb-4"><div class="text-sm text-[#a1a1aa]">Torn: <span style="color:'+(turn===1?'#2dd4bf':'#fbbf24')+';font-weight:700">Jugador '+turn+'</span></div><button class="btn-primary btn-sm" onclick="initConnect4()"><i class="fa-solid fa-rotate mr-1"></i> Nou</button></div>';
  html+='<div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat(7,3rem)">';
  for(let c=0;c<7;c++)html+='<div class="c4-col" style="height:2rem;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#52525b" data-col="'+c+'">\u25BC</div>';
  for(let r=0;r<6;r++)for(let c=0;c<7;c++){
    const v=grid[r][c];
    let cls='c4-cell';
    if(v===1)cls+=' player1';
    else if(v===2)cls+=' player2';
    html+='<div class="'+cls+'"></div>';
  }
  html+='</div></div>';
  if(gameOver)html+='<div class="text-center mt-4 '+(winner?'text-[#2dd4bf]':'text-[#52525b]')+' font-bold"><i class="fa-solid '+(winner?'fa-trophy':'fa-hand')+' mr-1"></i> '+(winner?'Jugador '+winner+' ha guanyat!':'Empat!')+'</div>';
  document.getElementById('gameArea').innerHTML=html;
  if(!gameOver){
    document.querySelectorAll('.c4-col').forEach(col=>{
      col.addEventListener('click',()=>{
        const c=parseInt(col.dataset.col);
        if(c4State.gameOver)return;
        const grid=c4State.grid;
        let r;
        for(r=5;r>=0;r--)if(!grid[r][c])break;
        if(r<0)return;
        grid[r][c]=c4State.turn;
        c4State.moves++;
        const win=checkC4Win(grid);
        if(win){c4State.gameOver=true;c4State.winner=c4State.turn;renderConnect4();return;}
        if(c4State.moves===42){c4State.gameOver=true;renderConnect4();return;}
        c4State.turn=c4State.turn===1?2:1;
        renderConnect4();
      });
    });
  }
}
function checkC4Win(grid){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<6;r++)for(let c=0;c<7;c++){
    const v=grid[r][c];
    if(!v)continue;
    for(const[dr,dc]of dirs){
      let count=1;
      for(let i=1;i<4;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=6||nc<0||nc>=7||grid[nr][nc]!==v)break;
        count++;
      }
      if(count>=4)return true;
    }
  }
  return false;
}

// ====== SIMON ======
let simonState={};
function initSimon(){
  simonState={sequence:[],playerIdx:0,playing:false,accepting:false,score:0,gameOver:false};
  simonAddStep();
}
function simonAddStep(){
  simonState.sequence.push(Math.floor(Math.random()*4));
  simonState.playerIdx=0;
  simonState.accepting=false;
  renderSimon();
  simonPlaySequence();
}
function simonPlaySequence(){
  const{sequence}=simonState;
  simonState.playing=true;
  let i=0;
  const colors=['#2dd4bf','#fbbf24','#ef4444','#a855f7'];
  const interval=setInterval(()=>{
    if(i>=sequence.length){clearInterval(interval);simonState.playing=false;simonState.accepting=true;renderSimon();return;}
    renderSimon(sequence[i]);
    i++;
  },500);
}
function renderSimon(highlight){
  const{sequence,playerIdx,playing,accepting,score,gameOver}=simonState;
  const colors=['#2dd4bf','#fbbf24','#ef4444','#a855f7'];
  const labels=['Verd','Groc','Vermell','Lila'];
  let html='<div class="flex items-center justify-between mb-4"><div class="text-sm text-[#a1a1aa]"><i class="fa-solid fa-star mr-1"></i> Puntuaci\xf3: '+score+'</div><button class="btn-primary btn-sm" onclick="initSimon()"><i class="fa-solid fa-rotate mr-1"></i> Nou</button></div>';
  html+='<div class="flex justify-center"><div style="display:grid;grid-template-columns:repeat(2,6rem);gap:0.75rem">';
  for(let i=0;i<4;i++){
    const isHighlight=highlight===i;
    html+='<button class="simon-btn" data-idx="'+i+'" style="width:6rem;height:6rem;border-radius:1rem;border:none;cursor:'+(accepting?'pointer':'default')+';background:'+(isHighlight?colors[i]:colors[i]+'66')+';transition:all .15s;opacity:'+(playing&&!isHighlight?'0.4':'1')+'"'+(accepting?'':' disabled')+'></button>';
  }
  html+='</div></div>';
  if(gameOver)html+='<div class="text-center mt-4 text-[#ef4444] font-bold"><i class="fa-solid fa-skull mr-1"></i> Game Over! Puntuaci\xf3: '+score+'</div>';
  else if(accepting)html+='<div class="text-center mt-3 text-sm text-[#a1a1aa]">Repeteix la seq\xfc\xe8ncia</div>';
  else if(playing)html+='<div class="text-center mt-3 text-sm text-[#a1a1aa]">Observa la seq\xfc\xe8ncia...</div>';
  document.getElementById('gameArea').innerHTML=html;
  if(accepting){
    document.querySelectorAll('.simon-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(!simonState.accepting||simonState.playing)return;
        const idx=parseInt(btn.dataset.idx);
        const expected=simonState.sequence[simonState.playerIdx];
        if(idx!==expected){simonState.gameOver=true;simonState.accepting=false;renderSimon();return;}
        simonState.playerIdx++;
        if(simonState.playerIdx>=simonState.sequence.length){
          simonState.score+=10;
          setTimeout(()=>simonAddStep(),500);
        }
        renderSimon();
      });
    });
  }
}
const games={hangman:initHangman,minesweeper:initMinesweeper,tictactoe:initTicTacToe,memory:initMemory,trivia:initTrivia,snake:initSnake,game2048:init2048,connect4:initConnect4,simon:initSimon};
document.addEventListener('DOMContentLoaded',()=>{
  initHangman();
  document.querySelectorAll('.game-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.game-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const game=btn.dataset.game;
      if(games[game])games[game]();
    });
  });
});
