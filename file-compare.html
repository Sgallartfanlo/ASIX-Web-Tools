<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File / Diff Compare</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.fira{font-family:'Fira Code',monospace}
.input-field{background:#18181b;border:1px solid #27272a;color:#e4e4e7;font-family:'Fira Code',monospace;font-size:0.9rem;padding:0.625rem 0.75rem;border-radius:0.5rem;width:100%;transition:all .2s;resize:vertical;min-height:200px}
.input-field:focus{outline:none;border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,0.15)}
.input-field:hover{border-color:#3f3f46}
.card{background:#18181b;border:1px solid #27272a;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.875rem;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem}
.footer-link{color:#52525b;text-decoration:none;transition:color .2s}
.footer-link:hover{color:#2dd4bf}
label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#a1a1aa;margin-bottom:0.375rem}
.btn{display:inline-flex;align-items:center;gap:0.375rem;background:#18181b;border:1px solid #27272a;color:#a1a1aa;padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.8rem;cursor:pointer;transition:all .2s;font-family:'Fira Code',monospace;height:2.25rem}
.btn:hover{background:#27272a;color:#e4e4e7}
.btn-primary{background:rgba(45,212,191,0.1);border-color:#2dd4bf;color:#2dd4bf}
.btn-primary:hover{background:rgba(45,212,191,0.2)}
.btn-accent{background:rgba(45,212,191,0.1);border-color:#2dd4bf;color:#2dd4bf}
.btn-accent:hover{background:rgba(45,212,191,0.2)}
.mode-tabs{display:flex;gap:0.5rem;margin-bottom:0}
.mode-tab{background:#18181b;border:1px solid #27272a;color:#a1a1aa;padding:0.375rem 0.75rem;border-radius:0.375rem;font-size:0.8rem;cursor:pointer;transition:all .2s;font-family:'Fira Code',monospace;height:2.25rem;display:inline-flex;align-items:center}
.mode-tab:hover{background:#27272a;color:#e4e4e7}
.mode-tab.active{background:rgba(45,212,191,0.1);border-color:#2dd4bf;color:#2dd4bf}
.diff-output{font-family:'Fira Code',monospace;font-size:0.8rem;overflow:auto;max-height:36rem}
.diff-output table{border-collapse:collapse;width:100%;white-space:pre}
.diff-output td{padding:0;vertical-align:top}
.diff-output tbody tr{border-bottom:1px solid #18181b}
.diff-output tbody tr:hover{opacity:0.95}
.ln{color:#52525b;text-align:right;padding:0.125rem 0.5rem;min-width:3rem;width:1%;user-select:none;font-size:0.7rem;vertical-align:top;white-space:nowrap}
.ln-del{color:#fca5a5}
.ln-add{color:#86efac}
.ln-mod{color:#fcd34d}
.ln-sep{color:#3f3f46;padding:0 0.25rem;user-select:none}
.cell{padding:0.125rem 0.5rem;white-space:pre;vertical-align:top;width:50%}
.cell-l{border-right:1px solid #27272a}
.cell-r{border-left:1px solid #27272a}
.dl{background:rgba(69,10,10,0.4)}
.da{background:rgba(5,46,22,0.4)}
.dm{background:rgba(69,26,3,0.4)}
.dl .cell{background:rgba(69,10,10,0.2)}
.da .cell{background:rgba(5,46,22,0.2)}
.dm .cell{background:rgba(69,26,3,0.2)}
.prefix{display:inline-block;width:1.2rem;text-align:center;user-select:none;flex-shrink:0}
.pr{color:#fca5a5}
.pa{color:#86efac}
.pm{color:#fcd34d}
.wdel{background:rgba(239,68,68,0.3);color:#fca5a5;text-decoration:line-through;border-radius:2px;padding:0 1px}
.wadd{background:rgba(34,197,94,0.3);color:#86efac;border-radius:2px;padding:0 1px}
.stats{display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem}
.stat-item{display:flex;align-items:center;gap:0.375rem;font-size:0.8rem}
.stat-label{color:#a1a1aa}
.stat-value{font-family:'Fira Code',monospace;font-weight:600;font-size:0.85rem}
.stats-divider{color:#27272a;user-select:none}
.hunk-header{background:#0f0f11;color:#2dd4bf;padding:0.25rem 0.75rem;font-family:'Fira Code',monospace;font-size:0.75rem;border-bottom:1px solid #27272a;border-top:1px solid #27272a}
.hunk-header:first-child{border-top:none}
.uline{display:flex;padding:0.125rem 0.75rem;gap:0.5rem;font-size:0.8rem;font-family:'Fira Code',monospace;align-items:flex-start}
.uline:hover{opacity:0.95}
.uline.un{background:transparent}
.uline.del{background:rgba(69,10,10,0.4)}
.uline.add{background:rgba(5,46,22,0.4)}
.uline.mod{background:rgba(69,26,3,0.4)}
.unum{color:#52525b;min-width:5rem;text-align:right;user-select:none;white-space:nowrap;font-size:0.7rem}
.umark{min-width:1.2rem;text-align:center;user-select:none}
.umark.u{color:#52525b}
.umark.d{color:#fca5a5}
.umark.a{color:#86efac}
.umark.m{color:#fcd34d}
.ucont{flex:1;white-space:pre-wrap;word-break:break-all}
@media(max-width:768px){
  .stats{flex-direction:column;gap:0.25rem}
  .stats-divider{display:none}
  .diff-output td{font-size:0.7rem}
  .ln{min-width:2rem;font-size:0.65rem}
  .mode-tab{font-size:0.7rem;padding:0.25rem 0.5rem}
}
</style>
</head>
<body>
<div class="max-w-5xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-1 flex items-center justify-center gap-3">
      <i class="fa-regular fa-copy text-[#2dd4bf] text-2xl"></i>
      File / Diff Compare
    </h1>
    <p class="text-[#a1a1aa] text-sm">Compare two text files line by line with word-level highlighting</p>
  </header>

  <div class="card mb-5">
    <div class="card-title"><i class="fa-regular fa-keyboard mr-2"></i>Input</div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label><i class="fa-regular fa-file-lines mr-1 text-[#52525b]"></i> Original (A)</label>
        <textarea id="textA" class="input-field" rows="10" placeholder="Paste original content here..."></textarea>
      </div>
      <div class="relative">
        <label><i class="fa-regular fa-pen-to-square mr-1 text-[#52525b]"></i> Modified (B)</label>
        <textarea id="textB" class="input-field" rows="10" placeholder="Paste modified content here..."></textarea>
      </div>
    </div>
    <div class="flex flex-wrap items-center gap-2 mt-4">
      <button id="compareBtn" class="btn btn-primary"><i class="fa-solid fa-play"></i> Compare</button>
      <button id="swapBtn" class="btn"><i class="fa-solid fa-arrow-right-arrow-left"></i> Swap</button>
      <button id="sampleBtn" class="btn"><i class="fa-regular fa-folder-open"></i> Load Sample</button>
      <button id="copyBtn" class="btn"><i class="fa-regular fa-clipboard"></i> Copy Diff</button>
      <span class="text-[#27272a] mx-1">|</span>
      <span class="mode-tab active" data-view="sbs"><i class="fa-regular fa-table-cells mr-1"></i>Side by Side</span>
      <span class="mode-tab" data-view="unified"><i class="fa-regular fa-align-left mr-1"></i>Unified</span>
    </div>
  </div>

  <div id="statsCard" class="card mb-5" style="display:none">
    <div class="card-title"><i class="fa-regular fa-chart-bar mr-2"></i>Statistics</div>
    <div class="stats" id="statsContent"></div>
  </div>

  <div id="outputCard" class="card" style="display:none">
    <div class="card-title"><i class="fa-regular fa-code-compare mr-2"></i>Diff Output</div>
    <div class="diff-output" id="diffOutput"></div>
  </div>

  <footer class="text-center mt-10 pb-6">
    <a href="#" class="footer-link text-xs"><i class="fa-regular fa-copyright mr-1"></i> File / Diff Compare</a>
  </footer>
</div>

<script>
// ===== DOM refs =====
var textA = document.getElementById('textA');
var textB = document.getElementById('textB');
var compareBtn = document.getElementById('compareBtn');
var swapBtn = document.getElementById('swapBtn');
var sampleBtn = document.getElementById('sampleBtn');
var copyBtn = document.getElementById('copyBtn');
var statsCard = document.getElementById('statsCard');
var statsContent = document.getElementById('statsContent');
var outputCard = document.getElementById('outputCard');
var diffOutput = document.getElementById('diffOutput');
var viewTabs = document.querySelectorAll('[data-view]');
var currentView = 'sbs';
var lastDiffData = null;

// ===== Sample data =====
var sampleA = [
  'server {',
  '    listen 80;',
  '    server_name example.com;',
  '    root /var/www/html;',
  '    index index.html;',
  '    ',
  '    location / {',
  '        try_files $uri $uri/ =404;',
  '    }',
  '    ',
  '    location /api {',
  '        proxy_pass http://localhost:3000;',
  '        proxy_set_header Host $host;',
  '    }',
  '    ',
  '    location /legacy {',
  '        proxy_pass http://localhost:8080;',
  '    }',
  '    ',
  '    error_page 404 /404.html;',
  '    location = /404.html {',
  '        root /var/www/html;',
  '    }',
  '}'
].join('\n');

var sampleB = [
  'server {',
  '    listen 443 ssl http2;',
  '    server_name example.com www.example.com;',
  '    root /var/www/html;',
  '    index index.html index.htm;',
  '    ',
  '    location / {',
  '        try_files $uri $uri/ /index.html;',
  '    }',
  '    ',
  '    location /api {',
  '        proxy_pass http://localhost:3000;',
  '        proxy_set_header Host $host;',
  '        proxy_set_header X-Real-IP $remote_addr;',
  '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;',
  '    }',
  '    ',
  '    location /static {',
  '        expires 30d;',
  '        add_header Cache-Control "public, immutable";',
  '    }',
  '    ',
  '    error_page 404 /404.html;',
  '    location = /404.html {',
  '        root /var/www/html;',
  '    }',
  '}'
].join('\n');

// ===== Helpers =====
function splitLines(text) {
  if (!text || text === '') return [];
  var lines = text.replace(/\r\n/g, '\n').split('\n');
  if (lines.length > 0 && lines[lines.length - 1] === '') lines.pop();
  return lines;
}

// ===== LCS Diff =====
function lcsDiff(linesA, linesB) {
  var m = linesA.length, n = linesB.length;
  var dp = [];
  for (var i = 0; i <= m; i++) {
    dp[i] = new Array(n + 1);
    for (var j = 0; j <= n; j++) dp[i][j] = 0;
  }
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      if (linesA[i - 1] === linesB[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
      else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  var ops = [];
  var i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && linesA[i - 1] === linesB[j - 1]) {
      ops.push({type: 'unchanged', aIdx: i - 1, bIdx: j - 1});
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
      ops.push({type: 'added', aIdx: -1, bIdx: j - 1});
      j--;
    } else {
      ops.push({type: 'deleted', aIdx: i - 1, bIdx: -1});
      i--;
    }
  }
  ops.reverse();
  // Merge adjacent deletions+additions into modifications
  var merged = [];
  var idx = 0;
  while (idx < ops.length) {
    if (ops[idx].type === 'deleted') {
      var delStart = idx;
      while (idx < ops.length && ops[idx].type === 'deleted') idx++;
      var delCount = idx - delStart;
      var addStart = idx;
      while (idx < ops.length && ops[idx].type === 'added') idx++;
      var addCount = idx - addStart;
      if (delCount > 0 && addCount > 0) {
        var paired = Math.min(delCount, addCount);
        for (var k = 0; k < paired; k++) {
          merged.push({type: 'modified', aIdx: ops[delStart + k].aIdx, bIdx: ops[addStart + k].bIdx});
        }
        for (var k = paired; k < delCount; k++) merged.push(ops[delStart + k]);
        for (var k = paired; k < addCount; k++) merged.push(ops[addStart + k]);
      } else {
        for (var k = delStart; k < idx; k++) merged.push(ops[k]);
      }
    } else {
      merged.push(ops[idx]);
      idx++;
    }
  }
  return merged;
}

// ===== Word Diff =====
function wordDiff(lineA, lineB) {
  var wordsA = lineA.split(/(\s+)/);
  var wordsB = lineB.split(/(\s+)/);
  if (wordsA.length === 0 && wordsB.length === 0) return [];
  var m = wordsA.length, n = wordsB.length;
  var dp = [];
  for (var i = 0; i <= m; i++) {
    dp[i] = new Array(n + 1);
    for (var j = 0; j <= n; j++) dp[i][j] = 0;
  }
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      if (wordsA[i - 1] === wordsB[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
      else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  var i = m, j = n;
  var ops = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && wordsA[i - 1] === wordsB[j - 1]) {
      ops.push({type: 'unchanged', word: wordsA[i - 1]});
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
      ops.push({type: 'added', word: wordsB[j - 1]});
      j--;
    } else {
      ops.push({type: 'deleted', word: wordsA[i - 1]});
      i--;
    }
  }
  ops.reverse();
  return ops;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== Stats =====
function computeStats(diffOps, linesA, linesB) {
  var stats = {totalA: linesA.length, totalB: linesB.length, additions: 0, deletions: 0, modifications: 0, unchanged: 0};
  for (var i = 0; i < diffOps.length; i++) {
    switch (diffOps[i].type) {
      case 'unchanged': stats.unchanged++; break;
      case 'added': stats.additions++; break;
      case 'deleted': stats.deletions++; break;
      case 'modified': stats.modifications++; break;
    }
  }
  return stats;
}

function renderStats(stats) {
  var items = [
    {label: 'Total A', value: stats.totalA, color: '#e4e4e7'},
    {label: 'Total B', value: stats.totalB, color: '#e4e4e7'},
    {label: 'Additions', value: stats.additions, color: '#86efac'},
    {label: 'Deletions', value: stats.deletions, color: '#fca5a5'},
    {label: 'Modifications', value: stats.modifications, color: '#fcd34d'},
    {label: 'Unchanged', value: stats.unchanged, color: '#a1a1aa'}
  ];
  var html = '';
  for (var i = 0; i < items.length; i++) {
    if (i > 0) html += '<span class="stats-divider">|</span>';
    html += '<div class="stat-item"><span class="stat-label">' + items[i].label + ':</span><span class="stat-value" style="color:' + items[i].color + '">' + items[i].value + '</span></div>';
  }
  return html;
}

// ===== Side by Side Render =====
function renderSbs(diffOps, linesA, linesB) {
  var html = '<table><thead><tr style="background:#0f0f11;position:sticky;top:0;z-index:2;border-bottom:1px solid #27272a">' +
    '<td class="ln" style="color:#52525b;padding:0.25rem 0.5rem;font-size:0.7rem">#</td>' +
    '<td class="cell cell-l" style="color:#a1a1aa;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em">Original</td>' +
    '<td class="ln" style="color:#52525b;padding:0.25rem 0.5rem;font-size:0.7rem">#</td>' +
    '<td class="cell cell-r" style="color:#a1a1aa;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em">Modified</td>' +
    '</tr></thead><tbody>';
  var aNum = 0, bNum = 0;
  for (var i = 0; i < diffOps.length; i++) {
    var op = diffOps[i];
    var cls = '', lnClsL = '', lnClsR = '', pL = '', pR = '', contL = '', contR = '', numL = '', numR = '';
    if (op.type === 'unchanged') {
      aNum++; bNum++;
      cls = '';
      pL = ' '; pR = ' ';
      contL = escHtml(linesA[op.aIdx]);
      contR = escHtml(linesB[op.bIdx]);
      numL = aNum; numR = bNum;
    } else if (op.type === 'deleted') {
      aNum++;
      cls = 'dl';
      lnClsL = 'ln-del';
      pL = '-';
      contL = escHtml(linesA[op.aIdx]);
      contR = ' ';
      numL = aNum; numR = '-';
    } else if (op.type === 'added') {
      bNum++;
      cls = 'da';
      lnClsR = 'ln-add';
      pR = '+';
      contL = ' ';
      contR = escHtml(linesB[op.bIdx]);
      numL = '-'; numR = bNum;
    } else if (op.type === 'modified') {
      aNum++; bNum++;
      cls = 'dm';
      lnClsL = 'ln-mod'; lnClsR = 'ln-mod';
      pL = '~'; pR = '~';
      var wd = wordDiff(linesA[op.aIdx], linesB[op.bIdx]);
      var leftHtml = '', rightHtml = '';
      for (var w = 0; w < wd.length; w++) {
        if (wd[w].type === 'unchanged') {
          leftHtml += escHtml(wd[w].word);
          rightHtml += escHtml(wd[w].word);
        } else if (wd[w].type === 'deleted') {
          leftHtml += '<span class="wdel">' + escHtml(wd[w].word) + '</span>';
        } else {
          rightHtml += '<span class="wadd">' + escHtml(wd[w].word) + '</span>';
        }
      }
      contL = leftHtml;
      contR = rightHtml;
      numL = aNum; numR = bNum;
    }
    html += '<tr class="' + cls + '">';
    html += '<td class="ln ' + lnClsL + '">' + numL + '</td>';
    html += '<td class="cell cell-l"><span class="prefix ' + pLtoC(pL) + '">' + pL + '</span>' + contL + '</td>';
    html += '<td class="ln ' + lnClsR + '">' + numR + '</td>';
    html += '<td class="cell cell-r"><span class="prefix ' + pLtoC(pR) + '">' + pR + '</span>' + contR + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function pLtoC(p) {
  if (p === '-') return 'pr';
  if (p === '+') return 'pa';
  if (p === '~') return 'pm';
  return '';
}

// ===== Unified Render =====
function renderUnified(diffOps, linesA, linesB) {
  var html = '';
  var aNum = 0, bNum = 0;
  var hunkA = 0, hunkB = 0, hunkLines = [];
  var inHunk = false;

  function flushHunk() {
    if (hunkLines.length === 0) return;
    var ctxBefore = 0;
    for (var i = 0; i < hunkLines.length; i++) {
      if (hunkLines[i].type !== 'unchanged') { ctxBefore = i; break; }
    }
    var ctxAfter = 0;
    for (var i = hunkLines.length - 1; i >= 0; i--) {
      if (hunkLines[i].type !== 'unchanged') { ctxAfter = hunkLines.length - 1 - i; break; }
    }
    var show = hunkLines.slice(Math.max(0, ctxBefore - 2), hunkLines.length - Math.max(0, ctxAfter - 2));
    // Adjust start
    var adjA = hunkA + ctxBefore;
    var adjB = hunkB + ctxBefore;
    var lenA = 0, lenB = 0;
    for (var i = 0; i < show.length; i++) {
      if (show[i].type === 'unchanged' || show[i].type === 'deleted' || show[i].type === 'modified') lenA++;
      if (show[i].type === 'unchanged' || show[i].type === 'added' || show[i].type === 'modified') lenB++;
    }
    html += '<div class="hunk-header">@@ -' + (adjA + 1) + ',' + lenA + ' +' + (adjB + 1) + ',' + lenB + ' @@</div>';
    for (var i = 0; i < show.length; i++) {
      var l = show[i];
      var mark = '', cls = '', cont = '';
      if (l.type === 'unchanged') { mark = ' '; cls = 'un'; cont = escHtml(linesA[l.aIdx]); }
      else if (l.type === 'deleted') { mark = '-'; cls = 'del'; cont = escHtml(linesA[l.aIdx]); }
      else if (l.type === 'added') { mark = '+'; cls = 'add'; cont = escHtml(linesB[l.bIdx]); }
      else if (l.type === 'modified') {
        var wd = wordDiff(linesA[l.aIdx], linesB[l.bIdx]);
        var rc = '';
        for (var w = 0; w < wd.length; w++) {
          if (wd[w].type === 'unchanged') rc += escHtml(wd[w].word);
          else if (wd[w].type === 'deleted') rc += '<span class="wdel">' + escHtml(wd[w].word) + '</span>';
          else rc += '<span class="wadd">' + escHtml(wd[w].word) + '</span>';
        }
        html += '<div class="uline del"><span class="unum">-</span><span class="umark d">-</span><span class="ucont">' + escHtml(linesA[l.aIdx]) + '</span></div>';
        mark = '+'; cls = 'add'; cont = rc;
      }
      html += '<div class="uline ' + cls + '"><span class="unum"></span><span class="umark ' + (mark === '+' ? 'a' : mark === '-' ? 'd' : mark === '~' ? 'm' : 'u') + '">' + mark + '</span><span class="ucont">' + cont + '</span></div>';
    }
    hunkLines = [];
  }

  for (var i = 0; i < diffOps.length; i++) {
    var op = diffOps[i];
    if (op.type === 'unchanged') {
      hunkLines.push(op);
    } else if (op.type === 'deleted') {
      if (!inHunk) { inHunk = true; hunkA = aNum; hunkB = bNum; }
      hunkLines.push(op);
    } else if (op.type === 'added') {
      if (!inHunk) { inHunk = true; hunkA = aNum; hunkB = bNum; }
      hunkLines.push(op);
    } else if (op.type === 'modified') {
      if (!inHunk) { inHunk = true; hunkA = aNum; hunkB = bNum; }
      hunkLines.push(op);
    }
    if (op.type === 'unchanged') { aNum++; bNum++; }
    else if (op.type === 'deleted') aNum++;
    else if (op.type === 'added') bNum++;
    else if (op.type === 'modified') { aNum++; bNum++; }
    // Flush hunk on too many unchanged
    if (op.type === 'unchanged' && inHunk) {
      var unchangedCount = 0;
      for (var j = hunkLines.length - 1; j >= 0 && hunkLines[j].type === 'unchanged'; j--) unchangedCount++;
      if (unchangedCount > 3) { flushHunk(); inHunk = false; }
    }
  }
  if (inHunk || hunkLines.length > 0) flushHunk();
  return html || '<div class="text-[#52525b] text-center py-8">No differences found</div>';
}

// ===== Main Render =====
function renderDiff(linesA, linesB) {
  var diffOps = lcsDiff(linesA, linesB);
  lastDiffData = {ops: diffOps, linesA: linesA, linesB: linesB};
  var stats = computeStats(diffOps, linesA, linesB);
  statsContent.innerHTML = renderStats(stats);
  statsCard.style.display = '';
  outputCard.style.display = '';
  if (currentView === 'sbs') {
    diffOutput.innerHTML = renderSbs(diffOps, linesA, linesB);
  } else {
    diffOutput.innerHTML = renderUnified(diffOps, linesA, linesB);
  }
}

// ===== Copy =====
function generateDiffText(diffOps, linesA, linesB) {
  var lines = [];
  var aNum = 0, bNum = 0;
  for (var i = 0; i < diffOps.length; i++) {
    var op = diffOps[i];
    if (op.type === 'unchanged') {
      aNum++; bNum++;
      lines.push(' ' + linesA[op.aIdx]);
    } else if (op.type === 'deleted') {
      aNum++;
      lines.push('-' + linesA[op.aIdx]);
    } else if (op.type === 'added') {
      bNum++;
      lines.push('+' + linesB[op.bIdx]);
    } else if (op.type === 'modified') {
      aNum++; bNum++;
      lines.push('-' + linesA[op.aIdx]);
      lines.push('+' + linesB[op.bIdx]);
    }
  }
  return lines.join('\n');
}

function copyDiff() {
  if (!lastDiffData) { return; }
  var text = generateDiffText(lastDiffData.ops, lastDiffData.linesA, lastDiffData.linesB);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var orig = copyBtn.innerHTML;
      copyBtn.innerHTML = '<i class="fa-regular fa-check"></i> Copied!';
      setTimeout(function() { copyBtn.innerHTML = orig; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var orig = copyBtn.innerHTML;
    copyBtn.innerHTML = '<i class="fa-regular fa-check"></i> Copied!';
    setTimeout(function() { copyBtn.innerHTML = orig; }, 2000);
  }
}

// ===== Events =====
function doCompare() {
  var linesA = splitLines(textA.value);
  var linesB = splitLines(textB.value);
  if (linesA.length === 0 && linesB.length === 0) {
    statsCard.style.display = 'none';
    outputCard.style.display = 'none';
    return;
  }
  renderDiff(linesA, linesB);
}

function doSwap() {
  var tmp = textA.value;
  textA.value = textB.value;
  textB.value = tmp;
  doCompare();
}

function doSample() {
  textA.value = sampleA;
  textB.value = sampleB;
  doCompare();
}

compareBtn.onclick = doCompare;
swapBtn.onclick = doSwap;
sampleBtn.onclick = doSample;
copyBtn.onclick = copyDiff;

for (var i = 0; i < viewTabs.length; i++) {
  (function(tab) {
    tab.onclick = function() {
      for (var j = 0; j < viewTabs.length; j++) viewTabs[j].classList.remove('active');
      tab.classList.add('active');
      currentView = tab.dataset.view;
      if (lastDiffData) {
        if (currentView === 'sbs') diffOutput.innerHTML = renderSbs(lastDiffData.ops, lastDiffData.linesA, lastDiffData.linesB);
        else diffOutput.innerHTML = renderUnified(lastDiffData.ops, lastDiffData.linesA, lastDiffData.linesB);
      }
    };
  })(viewTabs[i]);
}

// Keyboard shortcuts
textA.onkeydown = function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doCompare(); }
};
textB.onkeydown = function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doCompare(); }
};
</script>
</body>
